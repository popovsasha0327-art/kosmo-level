<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oracle AI 1.0: Knowledge Core</title>
    <style>
        :root {
            --bg: #020204;
            --card: rgba(10, 10, 15, 0.95);
            --oracle: #e60ced;
            --blue: #007aff;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.07);
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, sans-serif; margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .oracle-terminal {
            width: 95%; max-width: 500px; background: var(--card);
            border: 1px solid var(--border); border-radius: 30px;
            padding: 20px; box-shadow: 0 0 30px var(--oracle);
            display: flex; flex-direction: column; gap: 15px;
        }

        #chat-window {
            height: 250px; overflow-y: auto;
            border-bottom: 1px solid var(--border);
            padding: 10px; font-size: 14px; display: flex; flex-direction: column; gap: 10px;
        }

        .msg { padding: 8px 12px; border-radius: 12px; max-width: 85%; }
        .ai { background: rgba(230, 12, 237, 0.1); border-left: 3px solid var(--oracle); align-self: flex-start; }
        .user { background: var(--blue); align-self: flex-end; }

        .input-area { display: flex; gap: 10px; }
        input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 15px; padding: 12px; color: white; outline: none;
        }

        .pack-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .pack-btn { background: #1a1a1c; border: 1px solid var(--border); color: #888; font-size: 9px; padding: 8px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="oracle-terminal">
    <div style="font-size: 10px; color: var(--oracle); font-weight: bold; text-align: center;">ORACLE AI 1.0 • KNOWLEDGE CORE</div>
    
    <div id="chat-window">
        <div class="msg ai">Система авторизована. Я — Оракул, хранитель знаний Kosmo Level и Town Worker. Что ты хочешь узнать, Командир?</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Спроси о проекте или версии..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()" style="background:var(--oracle); border:none; border-radius:50%; width:40px; color:white; cursor:pointer;">➔</button>
    </div>

    <div class="pack-grid">
        <button class="pack-btn" onclick="ask('1.0')">v1.0</button>
        <button class="pack-btn" onclick="ask('3.3')">v3.3</button>
        <button class="pack-btn" onclick="ask('RTW')">RTW</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('user-input');

    // БАЗА ЗНАНИЙ (БИБЛИЯ ИИ)
    const bible = {
        "rtw": "RTW (Release Town Worker) — это легендарная фиолетовая линейка сайтов. Она была завершена и запечатана после запуска Оракула.",
        "stw": "STW (Service Town Worker) — сервисная линейка версий от 1.0 до 6.0. Настоящие рабочие лошадки системы.",
        "ptw": "PTW (Paris Town Worker) — финальный релиз, венец архитектуры сайтов.",
        "3.3": "Kosmo Level 3.3.worldpack — самая актуальная версия контента. Включает последние фиксы и защиту KLL.",
        "привет": "Привет! Если ты не мамонт, то добро пожаловать. Если мамонт — твой код 'привет как дела' здесь не сработает.",
        "оракул": "Я — AI 1.0, первая версия ИИ, созданная Саней для управления Эпицентром и выдачи .worldpack."
    };

    function sendMsg() {
        const text = input.value.toLowerCase();
        if(!text) return;

        addMsg(input.value, 'user');
        input.value = "";

        setTimeout(() => {
            let response = "Информации по данному запросу нет в Архивах. Возможно, это мамонтская дезинформация.";
            for (let key in bible) {
                if (text.includes(key)) { response = bible[key]; break; }
            }
            addMsg(response, 'ai');
        }, 500);
    }

    function addMsg(text, type) {
        const d = document.createElement('div');
        d.className = 'msg ' + type;
        d.innerText = text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    function ask(val) { input.value = val; sendMsg(); }
</script>

</body>
</html>
