<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oracle AI 1.0 - Worldpack HQ</title>
    <style>
        :root {
            --bg: #030305;
            --card: rgba(15, 15, 20, 0.98);
            --oracle: #e60ced;
            --blue: #007aff;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .oracle-box {
            width: 100%; max-width: 450px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 20px;
            box-shadow: 0 10px 40px rgba(230, 12, 237, 0.2);
            backdrop-filter: blur(15px);
        }

        #status-bar { font-size: 10px; color: var(--oracle); font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }

        #log { 
            font-size: 14px; line-height: 1.5; min-height: 100px; 
            border-left: 2px solid var(--oracle); padding-left: 12px; margin-bottom: 20px;
        }

        /* КНОПКИ ПАКОВ */
        .pack-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        
        .pack-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 12px; font-size: 11px;
            text-align: left; cursor: pointer; transition: 0.2s;
        }

        .pack-btn:hover { background: var(--oracle); border-color: var(--oracle); }

        /* КНОПКА СКАЧИВАНИЯ ПОД СООБЩЕНИЕМ */
        #download-zone { margin-top: 10px; display: none; }
        .dl-link {
            display: inline-block; background: var(--blue); color: white;
            text-decoration: none; padding: 10px 20px; border-radius: 10px;
            font-weight: bold; font-size: 13px; animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="oracle-box">
    <div id="status-bar">Connecting to oracle.ai...</div>
    <div id="log">Ожидание авторизации ядра...</div>
    
    <div id="interface" style="display: none;">
        <div class="pack-list">
            <button class="pack-btn" onclick="getPack('1.0')">📦 Pack 1.0</button>
            <button class="pack-btn" onclick="getPack('2.0')">📦 Pack 2.0</button>
            <button class="pack-btn" onclick="getPack('2.2')">📦 Pack 2.2</button>
            <button class="pack-btn" onclick="getPack('2.5')">📦 Pack 2.5</button>
            <button class="pack-btn" onclick="getPack('2.8')">📦 Pack 2.8</button>
            <button class="pack-btn" onclick="getPack('3.0')">📦 Pack 3.0</button>
            <button class="pack-btn" onclick="getPack('3.1')">📦 Pack 3.1</button>
            <button class="pack-btn" onclick="getPack('3.2')">📦 Pack 3.2</button>
            <button class="pack-btn" onclick="getPack('3.3')">📦 Pack 3.3</button>
        </div>
        <div id="download-zone"></div>
    </div>
</div>

<script>
    const log = document.getElementById('log');
    const statusBar = document.getElementById('status-bar');
    const dlZone = document.getElementById('download-zone');

    // ПРОВЕРКА ОРАКУЛА
    setTimeout(() => {
        // Здесь твоя логика проверки oracle.ai
        const coreKey = "startup_ok_key_2000%"; 
        
        if(coreKey === "startup_ok_key_2000%") {
            statusBar.innerText = "Oracle AI 1.0: Active";
            log.innerText = "Авторизация пройдена. Доступ к .worldpack открыт. Выберите версию для загрузки.";
            document.getElementById('interface').style.display = "block";
        } else {
            log.innerHTML = "<span style='color:red'>КРИТИЧЕСКАЯ ОШИБКА: Доступ запрещен системным администратором.</span>";
        }
    }, 150);

    function getPack(ver) {
        log.innerText = "Генерация ссылки для Kosmo Level " + ver + ".worldpack...";
        dlZone.style.display = "block";
        // В href укажи путь, где лежат файлы в твоем репозитории
        dlZone.innerHTML = `
            <div style="font-size:11px; margin-bottom:5px; color:#888;">Файл готов:</div>
            <a href="packs/Kosmo_Level_${ver}.worldpack" class="dl-link" download>⬇️ Скачать v${ver} (.worldpack)</a>
        `;
    }
</script>

</body>
</html>
