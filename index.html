<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#bf5af2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Oracle Epicenter</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* База и фон */
        body { 
            margin: 0; 
            background: #000; /* Глубокий черный для OLED/IPS */
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Контейнер Оракула */
        .oracle-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .oracle-container:active {
            transform: scale(0.95);
        }

        /* Твой шедевральный пульсирующий интерфейс */
        .oracle-mini {
            display: flex;
            gap: 15px;
            filter: drop-shadow(0 0 12px rgba(191, 90, 242, 0.4));
            animation: float 4s ease-in-out infinite;
        }

        .dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            position: relative;
            transition: 0.3s;
        }

        .blue { 
            background: #007aff; 
            box-shadow: 0 0 20px #007aff; 
            animation: pulse 2s infinite; 
        }
        
        .purple { 
            background: #bf5af2; 
            box-shadow: 0 0 20px #bf5af2; 
            animation: pulse 2s infinite 1s; 
        }

        /* Инфо-панель (скрытая по умолчанию) */
        .status-text {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
            animation: fadeIn 2s infinite alternate;
        }

        /* Анимации */
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.25); opacity: 1; box-shadow: 0 0 35px inherit; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0.2; }
            to { opacity: 0.7; }
        }

        /* Скрытие полосы прокрутки для чистоты */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="oracle-container" onclick="activateOracle()">
        <div class="oracle-mini">
            <div class="dot blue"></div>
            <div class="dot purple"></div>
        </div>
        <div class="status-text" id="status">Система: Чиста</div>
    </div>

    <script>
        // Логика взаимодействия
        function activateOracle() {
            const status = document.getElementById('status');
            status.innerText = "Оракул: На связи";
            status.style.color = "#bf5af2";
            status.style.opacity = "1";
            
            console.log("Штаб: Оракул активирован. Ресурсы в норме.");
            
            setTimeout(() => {
                status.innerText = "Система: Чиста";
                status.style.color = "white";
                status.style.opacity = "0.5";
            }, 3000);
        }

        // Регистрация Service Worker (чтобы работало оффлайн)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('SW не критичен для Эпицентра');
                });
            });
        }
    </script>
</body>
</html>
