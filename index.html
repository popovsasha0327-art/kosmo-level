<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kosmo Level Store</title>
    <style>
        :root {
            --accent: #bf5af2;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-heavy: rgba(15, 15, 20, 0.92);
            --border: rgba(255, 255, 255, 0.15);
            --bg: #050508;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- ШАПКА И БУРГЕР --- */
        .header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            z-index: 2000;
        }

        .burger-btn {
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        /* --- БОКОВОЕ МЕНЮ --- */
        .sidebar {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
            background: var(--glass-heavy);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--border);
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 3000;
            padding: 30px 20px;
        }
        .sidebar.active { left: 0; }

        /* --- ЗОНА ЧАТА --- */
        #chatDisplay {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 100px;
            scroll-behavior: smooth;
        }

        .msg { max-width: 80%; padding: 14px 18px; border-radius: 22px; font-size: 15px; line-height: 1.4; animation: msgIn 0.3s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(191, 90, 242, 0.3); }
        .msg.oracle { align-self: flex-start; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        /* --- ИНПУТ И ТРАНСФОРМАЦИЯ --- */
        .oracle-container {
            position: fixed; bottom: 25px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 450px;
            z-index: 1500;
        }

        .input-box {
            background: rgba(25, 25, 30, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 8px 10px 8px 20px;
            display: flex; align-items: center; gap: 10px;
            transition: 0.4s;
        }
        .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(191, 90, 242, 0.2); }

        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 16px; height: 40px; }

        .send-btn {
            background: var(--accent); border: none; border-radius: 50%;
            width: 42px; height: 42px; color: white; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:active { transform: scale(0.9); }

        /* --- КОНТЕКСТНОЕ МЕНЮ --- */
        .context-menu {
            position: absolute; bottom: 60px; right: 0;
            background: var(--glass-heavy);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: none; flex-direction: column; padding: 10px;
            min-width: 200px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .c-item { padding: 12px 15px; border-radius: 12px; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .c-item:hover { background: rgba(255,255,255,0.1); color: var(--accent); }

        /* --- ПОДСКАЗКИ ЧИПЫ --- */
        .chips-area {
            display: flex; gap: 8px; margin-top: 12px; justify-content: center;
            overflow-x: auto; padding-bottom: 5px; opacity: 0; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger-btn" onclick="toggleSidebar()">☰</div>
    </div>

    <div id="sidebar" class="sidebar">
        <h2 style="color: var(--accent);">KL Archive</h2>
        <p style="opacity: 0.5; font-size: 12px;">СИСТЕМА: PRIME DRIVE ACTIVE</p>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        <div id="chatsList">
            <p style="font-size: 14px; opacity: 0.8;">Нет активных сессий...</p>
        </div>
    </div>

    <div id="chatDisplay">
        <div class="msg oracle">Доброе утро, Саня! Штаб ЛМСХ на связи. 2.4 ГБ ОЗУ обнаружено. Система летит! 🚀</div>
    </div>

    <div class="oracle-container">
        <div class="input-box">
            <input type="text" id="oracleIn" placeholder="Спросить Оракула..." autocomplete="off">
            <div style="position: relative;">
                <button class="send-btn" id="sendBtn" onclick="handleSend()">➔</button>
                <div class="context-menu" id="ctxMenu">
                    <div class="c-item" onclick="specialAction('assist')">🚀 Быстрый Помощник</div>
                    <div class="c-item" onclick="specialAction('ram')">💾 В Prime RAM Drive</div>
                    <div class="c-item" onclick="specialAction('scene')">🎭 Сделать сцену</div>
                </div>
            </div>
        </div>
        <div id="chips" class="chips-area"></div>
    </div>

    <script>
        const input = document.getElementById('oracleIn');
        const chips = document.getElementById('chips');
        const chat = document.getElementById('chatDisplay');
        const ctxMenu = document.getElementById('ctxMenu');
        const sidebar = document.getElementById('sidebar');

        let isLoggedIn = false; // Состояние входа (смени на true для тестов)
        const RAM_DRIVE = new Map();

        // 1. БОКОВОЕ МЕНЮ (БУРГЕР)
        function toggleSidebar() {
            if (!isLoggedIn) {
                addMessage("oracle", "⚠️ Ошибка доступа: Аккаунт не зарегистрирован. Пожалуйста, войдите в систему Kosmo Level.");
                return;
            }
            sidebar.classList.toggle('active');
        }

        // 2. ОТПРАВКА СООБЩЕНИЙ
        function handleSend() {
            const val = input.value.trim();
            if (!val) return;

            addMessage("user", val);
            
            // Обработка команд
            setTimeout(() => {
                if (val === "//tab function status GSites") {
                    addMessage("oracle", "📡 [RAM-STATUS]: Модуль GSites стерт. Память рыбки очищена. Мы на 2.4 ГБ ОЗУ, Саня! Ахахаха!");
                } else {
                    addMessage("oracle", "Принято, Командир. Данные обработаны через Prime Drive.");
                }
            }, 600);

            input.value = "";
            updateUI();
        }

        function addMessage(type, text) {
            chat.innerHTML += `<div class="msg ${type}">${text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        // 3. КОНТЕКСТНОЕ МЕНЮ (УДЕРЖАНИЕ)
        let pressTimer;
        const btn = document.getElementById('sendBtn');

        btn.addEventListener('contextmenu', (e) => { e.preventDefault(); showCtx(); });
        btn.addEventListener('touchstart', (e) => pressTimer = setTimeout(() => showCtx(), 600));
        btn.addEventListener('touchend', () => clearTimeout(pressTimer));

        function showCtx() { ctxMenu.style.display = 'flex'; if(navigator.vibrate) navigator.vibrate(25); }

        function specialAction(type) {
            const val = input.value || "Пустой запрос";
            if(type === 'ram') {
                RAM_DRIVE.set(Date.now(), val);
                addMessage("oracle", "💾 Записано в локальный Prime Drive (ОЗУ).");
            } else if(type === 'scene') {
                document.body.style.background = "radial-gradient(circle, #1a0b2e 0%, #050508 100%)";
                addMessage("oracle", "🎭 Сцена активирована. Визуализация запущена!");
            }
            ctxMenu.style.display = 'none';
        }

        // 4. ТРАНСФОРМАЦИЯ И ЧИПЫ (//tab)
        input.addEventListener('input', () => {
            const val = input.value;
            chips.style.opacity = val.length > 0 ? "1" : "0";
            
            if (val === "//") {
                renderChips(['🛠️ tab', '⚙️ system']);
            } else if (val === "//tab ") {
                renderChips(['📡 function status GSites']);
            } else {
                renderChips(['📊 Статус', '🎄 Christmas', '🔑 Ultra']);
            }
        });

        function renderChips(list) {
            chips.innerHTML = list.map(t => `<div class="c-item" style="background:var(--glass)" onclick="fill('${t}')">${t}</div>`).join('');
        }

        function fill(t) { input.value = t; input.focus(); input.dispatchEvent(new Event('input')); }
        function updateUI() { chips.style.opacity = "0"; ctxMenu.style.display = 'none'; }

        // Закрытие всего по клику вне
        document.addEventListener('click', (e) => {
            if (!btn.contains(e.target)) ctxMenu.style.display = 'none';
            if (!sidebar.contains(e.target) && !document.querySelector('.burger-btn').contains(e.target)) sidebar.classList.remove('active');
        });
    </script>
</body>
</html>
