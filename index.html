<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LMSH PRESTIGE 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-site">LMSH PRESTIGE</div>
    
    <nav class="nav-right">
        <a href="index.html">Kosmo Level Store</a>
        
        <div class="dropdown">
            <button class="dropbtn">Помощники <span class="arrow">▼</span></button>
            <div class="dropdown-content">
                <div class="helper-item" onclick="toggleOracle()">
                    <div class="dots-group">
                        <span class="dot-purple"></span>
                        <span class="dot-blue"></span>
                    </div>
                    <b>Оракул ИИ</b>
                </div>
                <div class="helper-item" onclick="openHelper()">
                    <div class="q-circle">?</div> 
                    <b>Быстрый Помощник</b>
                </div>
                <div class="helper-item" onclick="location.href='titan.html'">
                    <span class="book-icon">≡</span> 
                    <b>Форма Восстановления</b>
                </div>
            </div>
        </div>

        <a href="#about">О Сайте</a>
        <a href="auth.html" id="user-link" class="login-btn">Войти</a>
    </nav>
</header>

<div id="oracle-modal" class="modal hidden">
    <div class="modal-content">
        <div class="oracle-header">
            <span id="oracle-status">🔮 Оракул ИИ</span>
            <button class="close-btn" onclick="toggleOracle()">×</button>
        </div>
        <div id="admin-nav" class="admin-menu"></div>
        <div class="chat-box" id="chat"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Спросить...">
            <button class="send-btn" onclick="sendMessage()">→</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
