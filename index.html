<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>KL Oracle Light</title>
    <style>
        :root { --accent: #bf5af2; --bg: #050508; --glass: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .header { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid var(--glass); }
        .burger { font-size: 24px; cursor: pointer; padding: 5px 15px; background: var(--glass); border-radius: 8px; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; background: #0a0a0f; transition: 0.3s; z-index: 100; padding: 20px; border-right: 1px solid var(--accent); }
        .sidebar.active { left: 0; }
        
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 14px; animation: in 0.2s; }
        @keyframes in { from { opacity: 0; transform: translateY(5px); } }
        .user { align-self: flex-end; background: var(--accent); }
        .oracle { align-self: flex-start; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); }

        .input-area { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 400px; display: flex; gap: 8px; }
        input { flex: 1; background: #15151a; border: 1px solid var(--glass); border-radius: 20px; padding: 12px 15px; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); border: none; border-radius: 50%; width: 45px; height: 45px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><div class="burger" onclick="side()">☰</div><span id="ram" style="margin-left:auto; font-size:10px; color:var(--accent)">PRIME DRIVE: 2.4GB FREE</span></div>
    <div id="sidebar" class="sidebar"><h3>KL Archive</h3><hr><p>Нет чатов</p></div>
    <div id="chat"><div class="msg oracle">Саня, Код Облегчен! Крейсер готов к деплою! 🚀</div></div>
    <div class="input-area">
        <input type="text" id="in" placeholder="Спросить Оракула..." onkeydown="if(event.key==='Enter')send()">
        <button onclick="send()">➔</button>
    </div>
    <script>
        const chat = document.getElementById('chat'), input = document.getElementById('in'), sidebar = document.getElementById('sidebar');
        let logged = false;
        function side() { if(!logged) { add("oracle", "⚠️ Вход не выполнен!"); return; } sidebar.classList.toggle('active'); }
        function send() {
            let v = input.value.trim(); if(!v) return;
            add("user", v);
            if(v === "//tab") add("oracle", "📡 Системный отчет: ОЗУ 2.4 ГБ. Полет нормальный.");
            else setTimeout(()=>add("oracle", "Принято. Обработано в ОЗУ."), 500);
            input.value = "";
        }
        function add(t, s) { chat.innerHTML += `<div class="msg ${t}">${s}</div>`; chat.scrollTop = chat.scrollHeight; }
        document.addEventListener('click', (e) => { if(!sidebar.contains(e.target) && !e.target.classList.contains('burger')) sidebar.classList.remove('active'); });
    </script>
</body>
</html>
