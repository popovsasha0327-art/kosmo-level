<div class="container">
    <header>
        <h1>A Better Place: World Packs</h1>
        <p>Выбирай и устанавливай лучшие паки для своей игры</p>
    </header>

    <div class="market-grid">
        <div class="pack-card">
            <div class="pack-preview" style="background-image: url('preview1.jpg');"></div>
            <div class="pack-info">
                <h3>Super Neon Pack</h3>
                <p>Версия: 1.2 | .worldpack</p>
                <button class="base-button" onclick="showNotify('Neon Pack установлен!')">Установить</button>
            </div>
        </div>

        <div class="pack-card">
            <div class="pack-preview" style="background-image: url('preview2.jpg');"></div>
            <div class="pack-info">
                <h3>Cyber City</h3>
                <p>Версия: 2.0 | .worldpack</p>
                <button class="base-button" onclick="showNotify('Cyber City загружается...')">Установить</button>
            </div>
        </div>
    </div>
</div>
