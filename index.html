<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>KL Elite - Эпицентр</title>
    <style>
        :root { --accent: #bf5af2; --bg: #050508; --glass: rgba(255,255,255,0.08); --card: #0d0d14; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }
        
        /* Паки Космо-Уровней */
        .hub { padding: 20px; flex: 1; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .pack { background: var(--card); border: 1px solid var(--glass); border-radius: 15px; padding: 20px; text-align: center; border-bottom: 3px solid var(--accent); }

        /* Секция Чата */
        #chat-zone { flex: 1; display: none; flex-direction: column; background: var(--bg); overflow-y: auto; padding: 20px; padding-bottom: 150px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; margin-bottom: 10px; font-size: 14px; }
        .user { align-self: flex-end; background: var(--accent); color: white; }
        .oracle { align-self: flex-start; background: var(--glass); border: 1px solid var(--accent); }

        /* ВСПЛЫВАЮЩЕЕ ОКНО (Вылетает из-под поля) */
        #pop-window { 
            position: fixed; bottom: -100px; left: 5%; width: 90%; 
            background: var(--accent); color: white; padding: 15px; 
            border-radius: 15px 15px 0 0; z-index: 100;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            font-weight: bold; font-size: 13px;
        }
        #pop-window.active { bottom: 80px; } /* Позиция над полем ввода */

        /* Панель ввода */
        .ui-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: #0d0d14; padding: 15px 0; z-index: 101; border-top: 1px solid var(--glass); }
        .input-wrap { width: 90%; margin: 0 auto; display: flex; gap: 10px; }
        input { flex: 1; background: #1a1a24; border: 1px solid var(--glass); border-radius: 25px; padding: 15px; color: white; outline: none; }
        .btn { background: var(--accent); border: none; width: 50px; height: 50px; border-radius: 50%; color: white; cursor: pointer; }

        /* Хакерский режим */
        .hacker-glow { text-shadow: 0 0 10px #00ff41; }
    </style>
</head>
<body>

    <div id="hub-page" class="hub">
        <h2 id="title">KL ЭПИЦЕНТР</h2>
        <div class="grid">
            <div class="pack" onclick="startChat('Космо Пак')">🌌<br>Космо</div>
            <div class="pack" onclick="startChat('YouTube Пак')">🎬<br>YouTube</div>
            <div class="pack" onclick="startChat('Инженерный')">⚙️<br>Инженер</div>
            <div class="pack" onclick="startChat('Архив')">📁<br>Архив</div>
        </div>
    </div>

    <div id="chat-zone"></div>

    <div id="pop-window">Вопрос: <span id="pop-text"></span></div>

    <div class="ui-bottom">
        <div class="input-wrap">
            <input type="text" id="main-in" placeholder="Спросить Оракула...">
            <button class="btn" onclick="fire()">➔</button>
        </div>
    </div>

    <script>
        const chatZone = document.getElementById('chat-zone');
        const pop = document.getElementById('pop-window');
        const popText = document.getElementById('pop-text');
        const input = document.getElementById('main-in');

        function startChat(name) {
            document.getElementById('hub-page').style.display = 'none';
            chatZone.style.display = 'flex';
            addMsg('oracle', `Активирован ${name}. Жду приказа, Командир.`);
        }

        function fire() {
            let val = input.value.trim();
            if(!val) return;

            // Команда ХАКЕРА
            if(val === "//add") {
                document.documentElement.style.setProperty('--accent', '#00ff41');
                document.getElementById('title').classList.add('hacker-glow');
                addMsg('oracle', "🟢 СИСТЕМА ПЕРЕШЛА В ХАКЕРСКИЙ РЕЖИМ.");
                input.value = "";
                return;
            }

            // 1. Показываем всплывашку (выезжает снизу)
            popText.innerText = val;
            pop.classList.add('active');

            // 2. Добавляем в чат
            addMsg('user', val);
            input.value = "";

            // 3. Ответ Оракула (Рандом из 4 вариантов)
            const answers = [
                "Данные всосаны в Эпицентр. Чисто.",
                "Сова подтверждает: мамонтов нет.",
                "Запрос прошит в 12 ГБ памяти.",
                "Сценарий выполнен. Ожидаю."
            ];

            setTimeout(() => {
                const rand = answers[Math.floor(Math.random() * answers.length)];
                addMsg('oracle', rand);
                
                // 4. Прячем всплывашку через 3 сек
                setTimeout(() => { pop.classList.remove('active'); }, 3000);
            }, 1000);
        }

        function addMsg(type, text) {
            const m = document.createElement('div');
            m.className = `msg ${type}`;
            m.innerText = text;
            chatZone.appendChild(m);
            chatZone.scrollTop = chatZone.scrollHeight;
        }
    </script>
</body>
</html>
