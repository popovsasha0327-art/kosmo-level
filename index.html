<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oracle AI 1.1 - Prestige Final</title>
    <style>
        :root {
            --bg: #010103;
            --card: rgba(10, 10, 15, 0.98);
            --oracle: #e60ced;
            --blue: #007aff;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 15px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .oracle-interface {
            width: 100%; max-width: 500px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 35px; padding: 30px;
            box-shadow: 0 0 50px rgba(230, 12, 237, 0.2);
            display: flex; flex-direction: column; gap: 20px;
            animation: emerge 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        .header {
            font-size: 10px; color: var(--oracle); font-weight: 900;
            text-align: center; text-transform: uppercase; letter-spacing: 3px;
        }

        #display {
            font-size: 16px; line-height: 1.6; min-height: 70px;
            border-left: 3px solid var(--oracle); padding-left: 20px;
            transition: all 0.3s;
        }

        .dl-zone { text-align: center; display: none; margin-top: 10px; }
        .dl-btn {
            display: inline-block; background: var(--blue); color: white;
            text-decoration: none; padding: 16px 32px; border-radius: 18px;
            font-weight: 800; font-size: 15px; box-shadow: 0 10px 25px rgba(0, 122, 255, 0.4);
            animation: slideUp 0.4s ease-out; transition: 0.2s;
        }
        .dl-btn:hover { transform: scale(1.03); filter: brightness(1.1); }

        .input-group {
            display: flex; gap: 10px; background: rgba(255,255,255,0.05);
            border-radius: 20px; padding: 5px 5px 5px 15px; border: 1px solid var(--border);
        }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 15px; }
        .send-btn {
            background: var(--oracle); border: none; border-radius: 15px;
            width: 45px; height: 45px; color: white; cursor: pointer; font-size: 18px;
        }

        .footer {
            font-size: 10px; color: #444; text-align: center;
            border-top: 1px solid var(--border); padding-top: 15px; line-height: 1.4;
        }

        @keyframes emerge { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="oracle-interface">
    <div class="header">Oracle AI 1.1 • Knowledge Core</div>
    
    <div id="display">
        Статус: Авторизован. Ядро Prestige активно. Напиши номер версии (например, "3.3") или команду.
    </div>

    <div id="dl-zone" class="dl-zone"></div>

    <div class="input-group">
        <input type="text" id="ai-input" placeholder="Команда для Оракула..." onkeypress="if(event.key==='Enter') process()">
        <button class="send-btn" onclick="process()">➔</button>
    </div>

    <div class="footer">
        ИИ Ошибается. Если это часто, то вы используете Версию ИИ для Мамонтов. Срочно уходите!
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const dlZone = document.getElementById('dl-zone');
    const input = document.getElementById('ai-input');

    const packs = ["1.0", "2.0", "2.1", "2.2", "2.5", "2.8", "2.9", "3.0", "3.1", "3.2", "3.3"];

    function process() {
        const val = input.value.toLowerCase();
        if(!val) return;

        let found = false;
        dlZone.style.display = "none";

        packs.forEach(v => {
            if(val.includes(v)) {
                let msg = `Запрос обработан. Генерирую ссылку на оригинальный Kosmo Level ${v}.worldpack.`;
                if(v === "2.1") msg = "Внимание! Обнаружен Дополнительный Уровень Предателя 2.1. Доступ открыт.";
                
                display.innerText = msg;
                dlZone.style.display = "block";
                dlZone.innerHTML = `<a href="packs/Kosmo_Level_${v}.worldpack" class="dl-btn" download>⬇️ СКАЧАТЬ v${v} ORIGINAL</a>`;
                found = true;
            }
        });

        if(!found) {
            if(val.includes("привет")) {
                display.innerText = "Привет, Командир. Оракул готов к выдаче мировых паков. Просто назови версию.";
            } else if(val.includes("rtw")) {
                display.innerText = "Линейка RTW закрыта. Будущее за .worldpack и Oracle AI 2.0.";
            } else {
                display.innerText = "Информации по запросу нет. Возможно, данные были стерты мамонтами.";
            }
        }
        
        input.value = "";
    }
</script>

</body>
</html>
