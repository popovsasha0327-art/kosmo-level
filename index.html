<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oracle AI 1.1 | Prestige HQ</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#02b6ed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --bg: #010103;
            --card: rgba(10, 10, 15, 0.85);
            --cyan: #02b6ed;
            --purple: #e60ced;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --grad: linear-gradient(90deg, #02b6ed 0%, #e60ced 100%);
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* Блокировка скролла всей страницы */
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, rgba(230, 12, 237, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(2, 182, 237, 0.05), transparent);
        }

        .oracle-container {
            width: 95%;
            max-width: 450px;
            height: 90vh;
            background: var(--card);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            animation: boot 0.6s ease-out;
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo {
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 3px;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        #chat-flow {
            flex-grow: 1;
            overflow-y: auto; /* Скролл разрешен только внутри чата */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        #chat-flow::-webkit-scrollbar { width: 4px; }
        #chat-flow::-webkit-scrollbar-thumb { background: var(--grad); border-radius: 10px; }

        .msg {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 85%;
            animation: slideIn 0.3s ease;
        }

        .ai-msg { background: rgba(255, 255, 255, 0.05); align-self: flex-start; border: 1px solid var(--border); }
        .user-msg { background: var(--grad); align-self: flex-end; box-shadow: 0 4px 15px rgba(2, 182, 237, 0.2); }

        .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 20px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 11px;
            text-align: center;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .download-btn:active { transform: scale(0.95); }

        .settings-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .theme-btn {
            width: 30px; height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }
        .theme-btn:active { transform: scale(0.9); }
        .t-prestige { background: linear-gradient(135deg, #02b6ed, #e60ced); }
        .t-storm { background: linear-gradient(135deg, #004e92, #000428); }
        .t-toxic { background: linear-gradient(135deg, #8e2de2, #4a00e0); }

        .input-box {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 12px;
            color: white;
            outline: none;
        }

        .send-btn {
            background: var(--grad);
            border: none;
            border-radius: 15px;
            width: 50px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .send-btn:active { transform: scale(0.85); }

        @keyframes boot { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="oracle-container">
    <div class="header">
        <div class="logo">Oracle AI 1.1</div>
    </div>

    <div class="settings-bar">
        <div class="theme-btn t-prestige" onclick="setTheme('prestige')"></div>
        <div class="theme-btn t-storm" onclick="setTheme('storm')"></div>
        <div class="theme-btn t-toxic" onclick="setTheme('toxic')"></div>
    </div>
    
    <div id="chat-flow">
        <div class="msg ai-msg">
            Система Prestige активна. <br>
            Доступны все версии: от 1.0 до 3.3 Insider.
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="user-in" placeholder="Например: 3.1" onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">➔</button>
    </div>
</div>

<script>
    // Защита контента
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Регистрация Service Worker (нужен для PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA Service Worker готов'))
                .catch(err => console.log('Ошибка SW:', err));
        });
    }

    function send() {
        const inp = document.getElementById('user-in');
        if(!inp.value) return;
        
        addMsg(inp.value, 'user-msg');
        const val = inp.value.trim();
        inp.value = "";

        setTimeout(() => {
            const versions = ["1.0", "2.0", "2.1", "2.2", "2.5", "2.8", "2.9", "3.0", "3.1", "3.2", "3.3"];
            if(versions.includes(val)) {
                addMsg(`Версия ${val} найдена в архиве. Генерирую ссылку на worldpack...`, 'ai-msg', val);
            } else {
                addMsg('Ошибка: Данная версия отсутствует. Мамонты такое не делали.', 'ai-msg');
            }
        }, 400);
    }

    function addMsg(text, type, ver = null) {
        const chat = document.getElementById('chat-flow');
        const d = document.createElement('div');
        d.className = 'msg ' + type;
        d.innerHTML = text;
        
        if(ver) {
            const btn = document.createElement('a');
            btn.className = 'download-btn';
            btn.href = `packs/Kosmo_Level_${ver}.worldpack`;
            btn.innerText = `⬇️ СКАЧАТЬ BUILD ${ver}`;
            btn.setAttribute('download', '');
            d.appendChild(btn);
        }

        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    function setTheme(theme) {
        const root = document.documentElement;
        if(theme === 'prestige') root.style.setProperty('--grad', 'linear-gradient(90deg, #02b6ed 0%, #e60ced 100%)');
        if(theme === 'storm') root.style.setProperty('--grad', 'linear-gradient(90deg, #004e92 0%, #000428 100%)');
        if(theme === 'toxic') root.style.setProperty('--grad', 'linear-gradient(90deg, #8e2de2 0%, #4a00e0 100%)');
    }
</script>

</body>
</html>
