<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmo Level Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="container">
    <header>
        <h1>Kosmo Level Store</h1>
        <div class="search-container">
            <input type="text" id="pack-search" placeholder="Поиск версий..." onkeyup="searchPacks()">
            <span class="search-icon">🔍</span>
        </div>
    </header>

    <div class="market-grid" id="market-grid">
        <div class="pack-card" id="pack-33">
            <div class="pack-icon-wrapper">
                <img src="icon33.png" class="pack-icon" alt="Kosmo 3.3">
                <svg class="loading-ring" viewBox="0 0 36 36">
                    <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path class="ring-progress" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                </svg>
            </div>
            <div class="pack-info">
                <h3>Kosmo Level 3.3</h3>
                <p>Версия: Релиз | .worldpack</p>
                <button class="install-btn" onclick="startInstall('pack-33')">Установить</button>
            </div>
        </div>
        
        </div>
</div>

<script src="script.js"></script>
</body>
</html>
