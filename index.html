<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmo Level Store v.3.3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-bg"></div>

<nav class="top-nav ios-blur">
    <div class="site-logo">KOSMO STORE</div>
    <div class="nav-links">
        <a href="#" class="nav-link">ГЛАВНАЯ</a>
        
        <div class="ai-trigger-container" onclick="toggleAI()">
            <div class="ultra-neon">
                <div class="dot d1"></div>
                <div class="dot d2"></div>
            </div>
            <span class="nav-link">ОРАКУЛ</span>
        </div>
        
        <a href="#" class="nav-link">НАСТРОЙКИ</a>
    </div>
</nav>

<div class="container">
    <div class="search-section">
        <input type="text" id="pack-search" placeholder="Поиск версий..." onkeyup="searchPacks()">
    </div>

    <div class="market-grid">
        <div class="pack-card ios-card" onclick="openPack('pack-30822')">
            <div class="card-image">
                <img src="unnamed (2).png" class="main-preview" alt="Pack Preview">
            </div>
            <div class="card-content">
                <h3>KL Preview 30822</h3>
                <div class="rating">4.9 ★★★★★</div>
                <button class="ios-btn-green">Установить</button>
            </div>
        </div>
    </div>
</div>

<div id="ai-interface" class="ai-window hidden ios-blur">
    <div class="ai-header">
        <div class="ai-status-dots">
            <span class="circle c1"></span>
            <span class="circle c2"></span>
        </div>
        <span class="header-title">LMLSH ORACLE</span>
    </div>
    <div id="chat-history"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Введите вопрос...">
        <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
