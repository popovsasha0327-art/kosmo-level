<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmo Level Store | Prestige 3.4</title>
    <style>
        :root {
            --bg: #050508;
            --accent: #bf5af2; /* Тот самый миллионный цвет */
            --blue: #007aff;
            --gold: #ffd60a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* ШАПКА ПО ЧЕРТЕЖУ */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px;
            background: rgba(5, 5, 8, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: fixed; top: 0; width: 100%; z-index: 100;
            box-sizing: border-box;
        }

        .nav-left { display: flex; align-items: center; gap: 15px; }
        .burger { font-size: 24px; cursor: pointer; }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        
        /* ЛОГОТИП С МЕНЯЮЩИМСЯ ЦВЕТОМ */
        .oracle-logo-mini {
            display: flex; gap: 4px; cursor: pointer;
        }
        .dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transition: 0.3s;
        }
        .dot.blue { background: var(--blue); box-shadow: 0 0 10px var(--blue); }

        /* КАРТОЧКИ ПАКОВ */
        .main-content {
            margin-top: 100px; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .store-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px; width: 90%; max-width: 400px;
            margin-bottom: 20px;
            text-align: center;
            transition: 0.3s;
        }
        .store-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .btn-more {
            background: var(--accent); color: white; border: none;
            padding: 10px 25px; border-radius: 10px; cursor: pointer;
            margin-top: 15px; font-weight: bold;
        }

        /* НИЖНЯЯ ПАНЕЛЬ ОРАКУЛА */
        .oracle-bottom-bar {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 600px;
            background: rgba(20, 20, 25, 0.9);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex; align-items: center; gap: 15px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .oracle-bottom-bar.hidden { transform: translateX(-50%) translateY(150px); opacity: 0; }

        .search-input {
            background: transparent; border: none; color: white; width: 100%;
            outline: none; font-size: 16px;
        }

        /* ВСПЛЫВАЮЩЕЕ ОКНО ЧАТА */
        .chat-overlay {
            position: fixed; bottom: -100%; left: 0;
            width: 100%; height: 80%;
            background: var(--bg);
            border-top: 2px solid var(--accent);
            border-radius: 30px 30px 0 0;
            z-index: 200;
            transition: 0.5s ease;
            padding: 20px;
            box-sizing: border-box;
        }
        .chat-overlay.active { bottom: 0; }

        .close-btn { font-size: 30px; float: right; cursor: pointer; color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <div class="burger">≡</div>
            <div style="font-size: 14px; font-weight: bold; letter-spacing: 1px;">KOSMO STORE</div>
        </div>
        <div class="nav-right">
            <div class="oracle-logo-mini" onclick="toggleChat()">
                <div class="dot blue"></div>
                <div class="dot"></div>
                <span style="font-size: 12px; margin-left: 5px;">▼</span>
            </div>
            <div style="color: var(--gold); cursor: pointer;" title="Справка">?</div>
            <a href="profile.html" style="text-decoration: none;">👤</a>
        </div>
    </header>

    <div class="main-content">
        <div class="store-card">
            <h2 style="margin: 0; color: var(--accent);">Kosmo Level 3.4</h2>
            <p style="opacity: 0.6;">Новая эра систем. Без ограничений Google.</p>
            <button class="btn-more">ПОДРОБНЕЕ</button>
        </div>

        <div class="store-card">
            <h2 style="margin: 0; color: #ff3b30;">Traitor Level</h2>
            <p style="opacity: 0.6;">Экспериментальный пак для профи.</p>
            <button class="btn-more" style="background: #ff3b30;">ПОДРОБНЕЕ</button>
        </div>
    </div>

    <div class="oracle-bottom-bar" id="bottomBar">
        <div class="oracle-logo-mini">
            <div class="dot blue"></div>
            <div class="dot"></div>
        </div>
        <input type="text" class="search-input" placeholder="Спросить Оракула..." onfocus="toggleChat()">
        <button style="background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer;">➤</button>
    </div>

    <div class="chat-overlay" id="chatWindow">
        <span class="close-btn" onclick="toggleChat()">×</span>
        <h3 style="color: var(--accent);">Oracle Intelligence</h3>
        <hr style="border: 0.5px solid var(--border);">
        <p style="text-align: center; opacity: 0.4; margin-top: 50px;">Оракул готов к работе...</p>
    </div>

    <script>
        function toggleChat() {
            const chat = document.getElementById('chatWindow');
            const bar = document.getElementById('bottomBar');
            chat.classList.toggle('active');
            bar.classList.toggle('hidden');
        }
    </script>
</body>
</html>
