<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Core v1.0</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1e1e1e, #3a3a3a);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .titan-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); /* Тот самый эффект стекла */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 35px; /* Твои любимые скругления */
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { opacity: 0.8; font-size: 16px; }
        .status-badge {
            background: #32d74b;
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="titan-card">
        <h1>TITAN CORE</h1>
        <p>Система развернута Агентом Сашей</p>
        <div class="status-badge">ONLINE</div>
        <p style="margin-top: 20px; font-size: 12px;">Redmi 9A LineageOS Optimized</p>
    </div>
</body>
</html>
