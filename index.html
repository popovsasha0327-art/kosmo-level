<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LMSH PRESTIGE | HQ</title>
    <style>
        :root {
            --bg: #050507;
            --card: rgba(28, 28, 30, 0.6);
            --accent: #007aff;
            --purple: #5856d6;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        .main-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at top right, #1c1c1e 0%, #050507 100%);
        }

        /* НАВИГАЦИЯ */
        .top-nav {
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(25px);
            z-index: 1000; border-bottom: 1px solid var(--border);
        }

        .nav-right { display: flex; align-items: center; gap: 25px; }

        .nav-dropdown { position: relative; display: inline-block; }
        .drop-btn { background: none; border: none; color: var(--text); cursor: pointer; font-size: 15px; font-weight: 600; }
        .drop-content {
            display: none; position: absolute; right: 0; background: #1c1c1e;
            min-width: 240px; border-radius: 18px; border: 1px solid var(--border);
            overflow: hidden; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-dropdown:hover .drop-content { display: block; }
        .drop-content a { color: white; padding: 14px 20px; text-decoration: none; display: block; font-size: 14px; }
        .drop-content a:hover { background: var(--accent); }

        /* ЯДРО ОРАКУЛА */
        .oracle-core { display: flex; gap: 6px; cursor: pointer; padding: 8px; border-radius: 20px; }
        .ball { width: 12px; height: 12px; border-radius: 50%; filter: blur(1px); }
        .b1 { background: var(--accent); animation: pulse 2s infinite; }
        .b2 { background: var(--purple); animation: pulse 2s infinite 1s; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } }

        /* КОНТЕНТ */
        .store-container { padding: 30px 20px; max-width: 1100px; margin: 0 auto; }
        .section-label { font-size: 24px; font-weight: 800; margin: 40px 0 20px; opacity: 0.9; }
        .packs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .glass-card {
            background: var(--card); padding: 30px; border-radius: 28px;
            border: 1px solid var(--border); backdrop-filter: blur(15px);
            cursor: pointer; transition: 0.4s;
        }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .v-num { font-size: 36px; font-weight: 900; color: var(--accent); }

        /* ОКНО ОРАКУЛА */
        #ai-interface {
            position: fixed; bottom: 25px; right: 25px; width: 360px; height: 520px;
            background: rgba(13, 13, 15, 0.98); border-radius: 35px;
            border: 1px solid var(--border); display: flex; flex-direction: column;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8); z-index: 9999;
            backdrop-filter: blur(30px); transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .ai-hidden { opacity: 0; transform: translateY(40px) scale(0.9); pointer-events: none; }
        
        .ai-header { padding: 18px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { padding: 12px 18px; border-radius: 22px; font-size: 14px; max-width: 85%; }
        .msg.ai { background: #242426; align-self: flex-start; border-bottom-left-radius: 5px; }
        .msg.user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 5px; }

        /* АНИМАЦИЯ СФЕР */
        .oracle-typing {
            display: flex; align-items: center; justify-content: center;
            padding: 12px; background: rgba(255,255,255,0.05);
            border-radius: 25px; width: 75px; height: 40px; position: relative;
        }
        .t-ball { width: 10px; height: 10px; border-radius: 50%; position: absolute; filter: blur(1.5px); }
        .tb-1 { background: var(--accent); animation: orbit 1.4s infinite ease-in-out; }
        .tb-2 { background: var(--purple); animation: orbit 1.4s infinite ease-in-out -0.7s; }
        @keyframes orbit { 0%, 100% { transform: translateX(-18px); opacity: 0.5; } 50% { transform: translateX(18px); opacity: 1; } }

        .ai-input-box { padding: 20px; display: flex; gap: 15px; align-items: center; border-top: 1px solid var(--border); }
        #user-input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        .send-btn { background: var(--accent); border: none; color: white; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="main-bg"></div>

    <nav class="top-nav">
        <div class="nav-left"><b>LMSH PRESTIGE</b></div>
        <div class="nav-right">
            <div class="nav-dropdown">
                <button class="drop-btn">ПОМОЩНИКИ ▼</button>
                <div class="drop-content">
                    <a href="demo.html">❓ Быстрый Помощник</a>
                    <a href="titan.html">🛠 Форма Восстановления</a>
                </div>
            </div>
            <div class="oracle-core" onclick="toggleAI()">
                <div class="ball b1"></div>
                <div class="ball b2"></div>
            </div>
        </div>
    </nav>

    <main class="store-container">
        <h2 class="section-label">АРХИВ KOSMO LEVEL</h2>
        <div class="packs-grid" id="main-grid">
            <div class="glass-card"><div class="v-num">3.4</div><p>В разработке...</p></div>
            <div class="glass-card"><div class="v-num">3.3</div><p>Stable Build</p></div>
        </div>
    </main>

    <div id="ai-interface" class="ai-hidden">
        <div class="ai-header">
            <div class="oracle-core"><div class="ball b1"></div><div class="ball b2"></div></div>
            <span style="font-weight:bold; font-size:12px;">ORACLE SYSTEM</span>
            <div onclick="toggleAI()" style="cursor:pointer">✕</div>
        </div>
        <div id="chat-history">
            <div class="msg ai">Штаб на связи. Ожидаю запрос... 🛠</div>
        </div>
        <div class="ai-input-box">
            <div class="attachment">📎</div>
            <input type="text" id="user-input" placeholder="Запрос в Штаб...">
            <button class="send-btn" onclick="sendMessage()">↑</button>
        </div>
    </div>

    <script>
        function toggleAI() {
            const ui = document.getElementById('ai-interface');
            ui.classList.toggle('ai-hidden');
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if(!val) return;

            addMsg('user', val);
            input.value = "";

            const history = document.getElementById('chat-history');
            const loader = document.createElement('div');
            loader.className = 'oracle-typing';
            loader.innerHTML = '<div class="t-ball tb-1"></div><div class="t-ball tb-2"></div>';
            history.appendChild(loader);
            history.scrollTop = history.scrollHeight;

            setTimeout(() => {
                loader.remove();
                addMsg('ai', "Запрос принят. Анализирую данные секторов... 🛰️");
            }, 1500);
        }

        function addMsg(type, text) {
            const history = document.getElementById('chat-history');
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.innerText = text;
            history.appendChild(d);
            history.scrollTop = history.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
