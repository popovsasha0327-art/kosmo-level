<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oracle AI 1.1 PRO - Chat Mode</title>
    <style>
        :root {
            --bg: #010103;
            --card: rgba(10, 10, 15, 0.98);
            --oracle: #e60ced;
            --blue: #007aff;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, sans-serif; margin: 0; padding: 10px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .oracle-interface {
            width: 100%; max-width: 500px; background: var(--card);
            border: 1px solid var(--border); border-radius: 35px;
            padding: 20px; box-shadow: 0 0 40px rgba(230, 12, 237, 0.2);
            display: flex; flex-direction: column; gap: 15px;
        }

        .header { font-size: 10px; color: var(--oracle); font-weight: 900; text-align: center; text-transform: uppercase; letter-spacing: 2px; }

        /* ОКНО ПЕРЕПИСКИ */
        #chat-flow {
            max-height: 350px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
            padding-right: 5px; scroll-behavior: smooth;
        }

        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; animation: slideUp 0.3s ease; max-width: 85%; }
        .ai-msg { background: rgba(230, 12, 237, 0.1); border-left: 3px solid var(--oracle); align-self: flex-start; }
        .user-msg { background: var(--blue); align-self: flex-end; }

        .dl-link {
            display: block; margin-top: 8px; background: #fff; color: #000;
            text-decoration: none; padding: 10px; border-radius: 10px;
            font-weight: 800; font-size: 12px; text-align: center;
        }

        .input-area { display: flex; gap: 8px; margin-top: 10px; }
        input {
            flex: 1; background: #141416; border: 1px solid var(--border);
            border-radius: 15px; padding: 12px; color: white; outline: none;
        }

        .footer { font-size: 9px; color: #444; text-align: center; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="oracle-interface">
    <div class="header">Oracle AI 1.1 • Prestige Chat</div>
    
    <div id="chat-flow">
        <div class="msg ai-msg">Авторизация подтверждена. Я — Оракул. Напиши что угодно, я найду версию в любом шуме.</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Введите команду..." onkeypress="if(event.key==='Enter') process()">
        <button onclick="process()" style="background:var(--oracle); border:none; border-radius:50%; width:40px; height:40px; color:white; cursor:pointer;">➔</button>
    </div>

    <div class="footer">
        ИИ Ошибается. Если это часто то вы используете Версию ИИ для Мамонтов. Срочно уходите!
    </div>
</div>

<script>
    const chat = document.getElementById('chat-flow');
    const input = document.getElementById('user-input');
    const packs = ["1.0", "2.0", "2.1", "2.2", "2.5", "2.8", "2.9", "3.0", "3.1", "3.2", "3.3"];

    function process() {
        const text = input.value;
        if(!text) return;

        addMsg(text, 'user-msg');
        const lowText = text.toLowerCase();
        input.value = "";

        setTimeout(() => {
            let found = false;
            let response = "Я просканировал твое сообщение, но не нашел в нем кодов доступа к Kosmo Level.";

            // УМНЫЙ ПОИСК В ШУМЕ
            packs.forEach(v => {
                if(lowText.includes(v)) {
                    response = `Обнаружен ключ доступа к версии ${v}. Генерирую ссылку на оригинальный .worldpack...`;
                    addMsg(response, 'ai-msg', v);
                    found = true;
                }
            });

            if(!found) {
                if(lowText.includes("привет")) response = "Приветствую, Командир. Ожидаю указаний для выгрузки данных.";
                else if(lowText.includes("rtw")) response = "Линейка RTW запечатана. Теперь мы работаем только с .worldpack.";
                addMsg(response, 'ai-msg');
            }
        }, 400);
    }

    function addMsg(text, className, ver = null) {
        const d = document.createElement('div');
        d.className = 'msg ' + className;
        d.innerText = text;
        
        if(ver) {
            const link = document.createElement('a');
            link.className = 'dl-link';
            link.href = `packs/Kosmo_Level_${ver}.worldpack`;
            link.innerText = `⬇️ СКАЧАТЬ ВЕРСИЮ ${ver}`;
            link.setAttribute('download', '');
            d.appendChild(link);
        }

        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
