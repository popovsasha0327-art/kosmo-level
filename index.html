<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Kosmo Level | 340</title>
    <link rel="stylesheet" href="main-prestige.css">
</head>
<body>

<header>
    <div style="font-weight: bold; cursor:pointer">≡ KOSMO</div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <div onclick="document.getElementById('drop').classList.toggle('active')" style="cursor:pointer; display:flex; gap:5px">
            <div class="dot"></div><div class="dot" style="background:#007aff"></div> ▼
        </div>
        <div id="drop" style="display:none; position:absolute; top:70px; right:50px; background:#111; padding:10px; border-radius:15px; border:1px solid var(--border)">
            <div style="padding:10px">Помощник</div>
            <div style="padding:10px">Форма ЛМСХ</div>
        </div>
        <a href="profile.html" style="text-decoration:none">👤</a>
    </div>
</header>

<main style="padding: 150px 20px; display:flex; flex-direction:column; align-items:center; gap:30px">
    <div class="store-card">
        <h1 style="color:var(--accent-solid)">Kosmo Level 3.4</h1>
        <button class="btn-more" style="background:var(--accent-solid); color:white; border:none; padding:10px 20px; border-radius:10px">ПОДРОБНЕЕ</button>
    </div>
</main>

<div class="oracle-bottom-bar" id="bottomBar">
    <div class="dot"></div>
    <input type="text" class="search-input" placeholder="Спросить Оракула...">
</div>

<div class="chat-overlay" id="chatWindow">
    <div onclick="document.getElementById('chatWindow').classList.remove('active'); document.getElementById('bottomBar').classList.remove('hidden')" style="float:right; cursor:pointer; font-size:30px">×</div>
    <h2>Oracle AI Premier 340</h2>
    <div style="display:flex; height:80%; gap:20px; margin-top:20px">
        <div id="chatHistory" style="width:30%; border-right:1px solid var(--border); position:relative">
            <div id="historyLockMessage" style="display:none; color:var(--accent-solid); text-align:center; padding-top:20px">ВОЙДИТЕ</div>
            <p style="opacity:0.2">История логов...</p>
        </div>
        <div id="chatDisplay" style="flex-grow:1; overflow-y:auto"></div>
    </div>
</div>

<script src="brain.js"></script>
</body>
</html>
