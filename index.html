<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LMSH PRESTIGE 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-site">LMSH PRESTIGE</div>
    
    <nav class="nav-right">
        <a href="index.html">Kosmo Level Store</a>
        
        <div class="dropdown">
            <button class="dropbtn">Помощники <span class="arrow">▼</span></button>
            <div class="dropdown-content">
                <div class="helper-item" onclick="toggleOracle()">
                    <div class="dots-group">
                        <span class="dot-purple"></span>
                        <span class="dot-blue"></span>
                    </div>
                    <b>Оракул ИИ</b>
                </div>
                <div class="helper-item" onclick="openHelper()">
                    <div class="q-circle">?</div> 
                    <b>Быстрый Помощник</b>
                </div>
                <div class="helper-item" onclick="location.href='titan.html'">
                    <span class="book-icon">≡</span> 
                    <b>Форма Восстановления</b>
                </div>
            </div>
        </div>

        <a href="#about">О Сайте</a>
        <a href="auth.html" id="user-link" class="login-btn">Войти</a>
    </nav>
</header>

<main class="chat-container">
    <div class="card">
        <h2 id="ai-head">ORACLE PRESTIGE</h2>

        <div id="chat">
            <div class="bubble ai">Здравствуйте! Я Агент из Oracle. Могу чем-то помочь или просто поболтаем?</div>
        </div>

        <div class="input-area">
            <button class="helper-mini-btn" onclick="openHelper()">❗️</button>
            <input type="text" id="ai-q" placeholder="Сообщение" onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="ask()">↑</button>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
