<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oracle AI Pro - Official HQ</title>
    <style>
        :root {
            --bg: #050507;
            --card: rgba(20, 20, 25, 0.95);
            --oracle-main: #e60ced;
            --oracle-glow: rgba(230, 12, 237, 0.3);
            --blue: #007aff;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* КОНТЕЙНЕР ОРАКУЛА */
        .oracle-container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 15px var(--oracle-glow);
            backdrop-filter: blur(20px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .status-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--oracle-main);
            font-weight: 900;
        }

        /* ОКНО ОТВЕТА */
        #display {
            font-size: 16px;
            line-height: 1.6;
            min-height: 120px;
            margin-bottom: 20px;
            color: #f2f2f7;
            border-left: 3px solid var(--oracle-main);
            padding-left: 15px;
        }

        /* КНОПКИ УПРАВЛЕНИЯ */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 15px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--oracle-main);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--oracle-glow);
        }

        /* КНОПКА +? (РАССМОТРЕНИЕ) */
        .btn-plus {
            grid-column: span 2;
            background: linear-gradient(90deg, var(--blue), var(--oracle-main));
            font-size: 14px;
            margin-top: 5px;
        }

        /* ФАТАЛЬНАЯ ОШИБКА ДЛЯ МАМОНТОВ */
        .error-msg {
            color: #ff453a;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="oracle-container">
        <div class="header">
            <div class="status-tag" id="status">Oracle System: Loading...</div>
            <div style="font-size: 12px; color: #444;">v3.4 PRO</div>
        </div>

        <div id="display">Инициализация нейросети... Ожидание подтверждения oracle.ai</div>

        <div class="grid" id="controls" style="display: none;">
            <button class="btn" onclick="ask('status')">Статус Ядра</button>
            <button class="btn" onclick="ask('update')">План Обновлений</button>
            <button class="btn" onclick="ask('security')">KLL Defender</button>
            <button class="btn" onclick="ask('about')">О создателе</button>
            <button class="btn btn-plus" onclick="requestAccess()">+? ПРЕДЛОЖИТЬ КОД</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const status = document.getElementById('status');
        const controls = document.getElementById('controls');

        // ТВОЯ КРИТИЧЕСКАЯ ПРОВЕРКА (startup in 0.1)
        let ai_core_active = false;
        
        // Имитация поиска oracle.ai. В реальности здесь будет запрос к твоему файлу.
        // Если там будет "Привет как дела" - проверка не пройдет!
        setTimeout(() => {
            const mock_file_content = "startup_ok_key_2000%"; // Это то, что должно быть в oracle.ai
            
            if (mock_file_content === "startup_ok_key_2000%") {
                ai_core_active = true;
                status.innerText = "Oracle System: Online";
                status.style.color = "#32d74b";
                controls.style.display = "grid";
                typeText("Система Oracle AI Pro успешно запущена. Добро пожаловать в Штаб, Командир. Лимиты Google Sites аннулированы.");
            } else {
                status.innerText = "CRITICAL ERROR";
                display.innerHTML = "<span class='error-msg'>ОШИБКА ЗАПУСКА: oracle.ai поврежден или имитирован мамонтом. Система заблокирована.</span>";
            }
        }, 100);

        function typeText(text) {
            display.innerText = "";
            let i = 0;
            let interval = setInterval(() => {
                if (i < text.length) {
                    display.innerText += text.charAt(i);
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, 25);
        }

        const responses = {
            'status': "Ядро работает на 2000% мощности. Проводник G-Sites синхронизирован. Мамонты под наблюдением.",
            'update': "Релиз 3.4 намечен на середину мая. В планах: полный переезд на GitHub и внедрение живого голоса.",
            'security': "KLL Defender активен. Попытки создания fish_control.fgg пресечены на корневом уровне.",
            'about': "Саня — Главный Архитектор. Его код не имеет границ. Мы — Prestige, мы — будущее."
        };

        function ask(type) {
            typeText(responses[type]);
        }

        function requestAccess() {
            typeText("РЕЖИМ РАССМОТРЕНИЯ (+?): Пожалуйста, свяжитесь с Саней. Подготовьте обоснование изменений и документацию к коду.");
        }
    </script>
</body>
</html>
