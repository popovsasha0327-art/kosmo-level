<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMSH PRESTIGE</title>
    <link rel="stylesheet" href="main-prestige.css">
</head>
<body>
    <div class="main-bg"></div>

    <nav class="top-nav">
        <div class="site-name">LMSH PRESTIGE</div>
        <div class="nav-right">
            <button class="profile-pill">Профиль</button>
            <div class="ai-navbar-btn" onclick="toggleAI()" style="cursor:pointer; margin-left:15px;">🌐</div>
        </div>
    </nav>

    <section class="stories-scroll">
        </section>

    <main class="packs-grid" id="main-grid">
        </main>

    <div id="ai-interface" class="ai-hidden">
        <div class="ai-header" style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
            <span>LMSH ORACLE</span>
            <span onclick="toggleAI()" style="cursor:pointer;">✕</span>
        </div>
        <div id="chat-history" style="flex:1; overflow-y:auto; padding:15px;"></div>
        <div class="ai-input" style="padding:15px; display:flex; gap:10px;">
            <input type="text" id="user-input" style="flex:1; background:rgba(255,255,255,0.1); border:none; border-radius:10px; color:#fff; padding:10px;">
            <button onclick="sendMessage()" style="background:var(--accent); border:none; border-radius:10px; padding:0 15px;">↑</button>
        </div>
    </div>

    <div id="pack-modal" class="modal-hidden">
        <div class="modal-overlay" onclick="closePack()"></div>
        <div class="modal-content">
            <h2 id="modal-title">Название</h2>
            <p>Версия: <span id="modal-ver"></span></p>
            <button class="profile-pill" style="margin-top:20px;" onclick="openAndAsk()">Оракул о Паке</button>
        </div>
    </div>

    <script src="brain.js"></script>
</body>
</html>
