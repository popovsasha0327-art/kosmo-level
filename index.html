<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KL L-Oracle | Prestige Edition</title>
    <style>
        /* БАЗОВЫЕ СТИЛИ ШТАБА */
        :root {
            --accent: #bf5af2;
            --accent-solid: #af52de;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --gold: #ffd60a;
        }

        body {
            background: #050507;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* КОНТЕЙНЕР ОРАКУЛА (ТРАНСФОРМЕР) */
        .oracle-wrapper {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 380px; /* По умолчанию узкий */
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        /* РАСШИРЕНИЕ ПРИ КЛИКЕ */
        .oracle-wrapper:focus-within {
            max-width: 550px;
        }

        .input-box {
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(25px); /* Тот самый стеклянный эффект */
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            flex-shrink: 0;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            width: 100%;
            outline: none;
        }

        /* КНОПКА ОТПРАВИТЬ */
        .send-btn {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: var(--accent-solid);
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .oracle-wrapper:focus-within .send-btn {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }

        /* КНОПКИ-ПОДСКАЗКИ СНИЗУ */
        .quick-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
            opacity: 0;
            transform: translateY(-15px);
            transition: all 0.5s 0.2s ease; /* Задержка появления */
            pointer-events: none;
        }

        .oracle-wrapper:focus-within .quick-actions {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .q-chip {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 18px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .q-chip:hover {
            border-color: var(--accent);
            background: rgba(191, 90, 242, 0.1);
            color: white;
        }

        /* ДЛЯ ПЛАНШЕТА (Оптимизация 1 ГБ) */
        @media (max-width: 600px) {
            .oracle-wrapper:focus-within { max-width: 95%; }
            .q-chip { font-size: 11px; padding: 6px 10px; }
        }
    </style>
</head>
<body>

    <div id="app" style="padding: 20px;">
        <h1 style="font-size: 20px; opacity: 0.3;">L-ORACLE SYSTEM v3.0</h1>
    </div>

    <div class="oracle-wrapper">
        <div class="input-box">
            <div class="status-dot"></div>
            <input type="text" id="oracleIn" placeholder="Спросить Оракула..." autocomplete="off">
            <button class="send-btn" onclick="processQuery()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>

        <div class="quick-actions">
            <div class="q-chip" onclick="fillInput('📊 Статус Системы')">📊 Статус</div>
            <div class="q-chip" onclick="fillInput('🎄 Прогресс Christmas Pack')">🎄 Christmas</div>
            <div class="q-chip" onclick="fillInput('🔑 Допуск Ultra')">🔑 Ultra</div>
        </div>
    </div>

    <script>
        // ЛОГИКА ШТАБА (brain.js)
        
        function fillInput(text) {
            const input = document.getElementById('oracleIn');
            input.value = text;
            input.focus();
        }

        function processQuery() {
            const input = document.getElementById('oracleIn');
            const query = input.value;
            
            if(!query) return;

            // Эффект "обработки"
            input.value = "Связь со Штабом...";
            input.disabled = true;

            setTimeout(() => {
                alert("Оракул принял запрос: " + query);
                input.value = "";
                input.disabled = false;
                input.focus();
            }, 1000);
        }

        // Закрытие кнопок при клике мимо (для удобства на планшете)
        document.addEventListener('click', (e) => {
            const wrapper = document.querySelector('.oracle-wrapper');
            if (!wrapper.contains(e.target)) {
                document.getElementById('oracleIn').blur();
            }
        });
    </script>

</body>
</html>
