<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kosmo Level Store v.3.3</title>
    <style>
        :root {
            --bg: #0b0b0d;
            --nav-bg: rgba(18, 18, 20, 0.85);
            --card-bg: rgba(28, 28, 30, 0.6);
            --accent-cyan: #00f2ff;
            --accent-purple: #bf5af2;
            --accent-green: #34c759;
            --text-main: #ffffff;
            --ios-blur: blur(20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text-main); overflow-x: hidden; }

        /* Фоновое свечение */
        .glow { position: fixed; width: 300px; height: 300px; filter: blur(100px); z-index: -1; opacity: 0.15; pointer-events: none; }
        .glow-1 { top: -50px; left: -50px; background: var(--accent-cyan); }
        .glow-2 { bottom: -50px; right: -50px; background: var(--accent-purple); }

        /* НАВИГАЦИЯ */
        nav {
            position: fixed; top: 0; width: 100%; height: 64px;
            background: var(--nav-bg); backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .nav-left-mobile { display: none; cursor: pointer; font-size: 24px; }
        .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }

        /* МОБИЛЬНОЕ МЕНЮ (Слева) */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed; top: 0; left: -100%; width: 280px; height: 100vh;
                background: #121214; flex-direction: column; padding: 80px 20px;
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999;
            }
            .nav-links.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
            .nav-left-mobile { display: block; }
        }

        .nav-item { font-size: 14px; font-weight: 600; color: #8e8e93; text-decoration: none; cursor: pointer; transition: 0.2s; }
        .nav-item:hover { color: #fff; }

        /* КАРТОЧКИ И КОНТЕНТ */
        .container { padding: 84px 20px 40px; max-width: 600px; margin: 0 auto; }
        .search-bar { width: 100%; background: rgba(255,255,255,0.08); border: none; padding: 14px; border-radius: 12px; color: white; margin-bottom: 25px; outline: none; }

        .card { background: var(--card-bg); border-radius: 24px; border: 0.5px solid rgba(255,255,255,0.1); margin-bottom: 20px; overflow: hidden; backdrop-filter: var(--ios-blur); }
        .card-img { width: 100%; height: 200px; background: #1c1c1e; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 20px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        .btn-green { background: var(--accent-green); color: white; }
        .btn-blur { background: rgba(255,255,255,0.1); color: white; }

        /* МОДАЛЬНЫЕ ОКНА (ОРАКУЛ, ТИТАН, ДЕМО) */
        .modal-window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 380px; background: rgba(20, 20, 25, 0.98);
            backdrop-filter: blur(25px); border-radius: 25px; z-index: 3000;
            display: none; flex-direction: column; border: 0.5px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        .modal-window.open { display: flex; animation: modalIn 0.3s forwards; }
        @keyframes modalIn { to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .modal-header { padding: 18px; border-bottom: 0.5px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .modal-content { padding: 20px; text-align: center; }

        /* ОТЗЫВЫ (BOTTOM SHEET) */
        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 4000; display: none; align-items: flex-end; }
        .sheet { width: 100%; background: #1c1c1e; border-radius: 24px 24px 0 0; padding: 20px; transform: translateY(100%); transition: 0.4s; }
        .sheet.open { transform: translateY(0); }

        .hidden { display: none !important; }
        .ios-input { width: 100%; background: #2a2a2e; border: none; padding: 12px; border-radius: 12px; color: white; margin: 10px 0; outline: none; }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <nav>
        <div class="nav-left-mobile" onclick="toggleMobileMenu()">☰</div>
        <div class="logo">KOSMO STORE</div>
        <div class="nav-links" id="navLinks">
            <a href="#" class="nav-item" onclick="toggleMobileMenu()">ГЛАВНАЯ</a>
            <div class="nav-item" onclick="openModal('oracle-win')">🔮 ОРАКУЛ ИИ</div>
            <div class="nav-item" onclick="openModal('demo-win')">🤖 ДЕМО ПОМОЩНИК</div>
            <div class="nav-item" onclick="openModal('titan-win')">📝 ЛМСХ ФОРМА</div>
        </div>
        <div class="nav-item">⚙️</div>
    </nav>

    <div class="container">
        <input type="text" class="search-bar" placeholder="Поиск паков..." onkeyup="search(this)">
        <div class="card" data-name="kl preview 30822">
            <div class="card-img"><img src="unnamed (2).png"></div>
            <div class="card-body">
                <h3>KL Preview 30822</h3>
                <p style="color:#8e8e93; font-size:12px;">4.9 ★★★★★ • 1.2 GB</p>
                <div class="btn-group">
                    <button class="btn btn-green" onclick="alert('Загрузка начата...')">УСТАНОВИТЬ</button>
                    <button class="btn btn-blur" onclick="openSheet('KL Preview 30822')">ОТЗЫВЫ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="oracle-win" class="modal-window">
        <div class="modal-header" style="color:var(--accent-cyan)"><span>🔮 ORACLE AI</span> <button onclick="closeModal('oracle-win')" style="background:none; border:none; color:white;">✕</button></div>
        <div class="modal-content">
            <p>Задайте вопрос Оракулу:</p>
            <input type="text" class="ios-input" placeholder="Ваш вопрос...">
            <button class="btn btn-green" style="width:100%">ОТПРАВИТЬ</button>
        </div>
    </div>

    <div id="titan-win" class="modal-window">
        <div class="modal-header" style="color:var(--accent-purple)"><span>📝 TITAN FORM</span> <button onclick="closeModal('titan-win')" style="background:none; border:none; color:white;">✕</button></div>
        <div class="modal-content">
            <h2 style="color:red; margin-bottom:10px;">02:59</h2>
            <input type="password" class="ios-input" placeholder="ПИН-КОД">
            <button class="btn btn-blur" style="width:100%; border:1px solid var(--accent-purple)">ВОЙТИ</button>
        </div>
    </div>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
        <div class="sheet" id="sheet">
            <div style="width:40px; height:5px; background:rgba(255,255,255,0.2); border-radius:3px; margin: 0 auto 15px;"></div>
            <h2 id="sheet-title">Отзывы</h2>
            <div id="reviews-content" style="margin-top:20px;">
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; margin-bottom:10px;">
                    <b style="color:var(--accent-cyan)">Мурзик:</b> Пак просто космос!
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleMobileMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('open');
            if(window.innerWidth <= 768) toggleMobileMenu();
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        function openSheet(name) {
            document.getElementById('sheet-title').innerText = name;
            document.getElementById('sheetOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('sheet').classList.add('open'), 10);
        }

        function closeSheet(e) {
            if (e && e.target !== document.getElementById('sheetOverlay')) return;
            document.getElementById('sheet').classList.remove('open');
            setTimeout(() => document.getElementById('sheetOverlay').style.display = 'none', 400);
        }

        function search(el) {
            let val = el.value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.dataset.name.includes(val) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
