<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMSH PRESTIGE HUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-links">
            <span>Kosmo Level Store</span>
            <span>Kosmogram</span>
            <b onclick="toggleOracle()" style="cursor:pointer">🔮 ОРАКУЛ</b>
        </div>
        <a href="auth.html" id="login-link" class="login-btn">ВОЙТИ</a>
    </header>

    <div id="oracle-modal" class="modal hidden">
        <div class="modal-content">
            <div class="oracle-header">
                <span id="oracle-title">Привет, агент!</span>
                <button onclick="toggleOracle()">×</button>
            </div>
            <div id="admin-nav" class="admin-menu"></div> <div class="chat-box" id="chat">
                </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Спросить Оракула...">
                <button onclick="sendMessage()">→</button>
            </div>
        </div>
    </div>

    <div id="quick-helper" class="helper-bubble" onclick="openHelper()">
        ❗️
    </div>

    <script src="script.js"></script>
</body>
</html>
