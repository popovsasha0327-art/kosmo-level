<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LMSH | Быстрый Помощник</title>
    <link rel="stylesheet" href="imessage.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="back-btn" onclick="window.location.href='index.html'">‹ Назад</div>
            <div class="contact-info">
                <div class="avatar">🤖</div>
                <div class="name">Быстрый Помощник</div>
                <div class="status">в сети</div>
            </div>
            <div class="info-icon">ⓘ</div>
        </header>

        <main class="chat-main" id="chat-window">
            <div class="msg-time">Сегодня, 16:20</div>
            <div class="message incoming">
                Привет! Я помогу тебе разобраться с Kosmo Level. О чем хочешь узнать?
            </div>
        </main>

        <div id="quick-hints" class="suggestions-container">
            <div class="hint-chip" onclick="askHint('Что за секрет будет 26 Апреля 2026?')">🤫 Секрет 26 апреля?</div>
            <div class="hint-chip" onclick="askHint('Как установить пак 3.3?')">💾 Установка 3.3</div>
            <div class="hint-chip" onclick="askHint('Где найти архив?')">📂 Архив версий</div>
        </div>

        <footer class="chat-input-area">
            <div class="plus-btn">+</div>
            <div class="input-wrapper">
                <input type="text" id="msg-input" placeholder="iMessage" autocomplete="off">
                <div class="audio-btn">🎤</div>
            </div>
            <button id="send-btn" onclick="sendMsg()">↑</button>
        </footer>
    </div>

    <script src="imessage-logic.js"></script>
</body>
</html>
