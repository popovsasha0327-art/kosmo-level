<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LMSH | Быстрый Помощник</title>
    <style>
        :root { --ios-blue: #0a84ff; --ios-bg: #000000; --ios-gray: #1c1c1e; --ios-text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--ios-bg); color: var(--ios-text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER */
        .chat-header { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 0.5px solid #333;
        }
        .back-btn { color: var(--ios-blue); cursor: pointer; text-decoration: none; font-size: 17px; }
        
        /* ЧАТ */
        .chat-main { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .message { 
            padding: 12px 16px; border-radius: 20px; font-size: 16px; max-width: 80%; line-height: 1.4; 
            animation: msgPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes msgPop { from { opacity: 0; transform: scale(0.8) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .incoming { background: var(--ios-gray); align-self: flex-start; border-bottom-left-radius: 4px; }
        .outgoing { background: var(--ios-blue); align-self: flex-end; border-bottom-right-radius: 4px; }

        /* ИНДИКАТОР ПЕЧАТИ */
        .typing { display: flex; gap: 4px; padding: 12px 16px; background: var(--ios-gray); border-radius: 20px; width: fit-content; margin: 5px 0; }
        .dot { width: 6px; height: 6px; background: #8e8e93; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* ПАНЕЛЬ ПОДСКАЗОК (КНОПКИ) */
        .suggestions-area { 
            padding: 15px; background: #000; border-top: 0.5px solid #333;
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
        }
        .hint-btn { 
            background: #1c1c1e; border: 1px solid #333; color: var(--ios-blue); 
            padding: 10px 18px; border-radius: 20px; font-size: 14px; cursor: pointer;
            transition: 0.2s; white-space: nowrap;
        }
        .hint-btn:active { transform: scale(0.9); background: #2c2c2e; }

        /* ВВОД (СКРЫТ ПО УМОЛЧАНИЮ, ЧТОБЫ ТЫКАЛИ КНОПКИ) */
        .input-bar { padding: 10px 15px 30px; display: flex; gap: 10px; background: #000; border-top: 0.5px solid #333; }
        .input-bar input { flex: 1; background: #1c1c1e; border: none; border-radius: 20px; padding: 10px 15px; color: white; outline: none; }
    </style>
</head>
<body>

    <header class="chat-header">
        <a href="index.html" class="back-btn">‹ Выход</a>
        <div style="text-align:center">
            <b style="display:block">Быстрый Помощник</b>
            <span id="status" style="font-size:11px; color:#8e8e93">в сети</span>
        </div>
        <div style="width:40px"></div>
    </header>

    <main class="chat-main" id="chat-box">
        <div class="message incoming">Привет, Саня! Я на посту. Какой сектор проверим? ⚡️</div>
    </main>

    <div class="suggestions-area" id="hints-box">
        </div>

    <div class="input-bar">
        <input type="text" id="user-in" placeholder="Или напиши сам...">
        <button onclick="manualSend()" style="background:none; border:none; color:var(--ios-blue); font-weight:bold;">Отпр.</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const hintsBox = document.getElementById('hints-box');
        const status = document.getElementById('status');

        // ДЕРЕВО ДИАЛОГОВ
        const flow = {
            start: [
                { text: "🚀 Что в 3.4?", next: "v34" },
                { text: "📂 Где архив?", next: "archive" },
                { text: "🛠 Не работает...", next: "fix" }
            ],
            v34: {
                reply: "v3.4 почти готова! Главные фишки: Оракул 2.0 и новый Titan. Релиз 26 апреля. 📈",
                hints: [
                    { text: "⏰ Время релиза?", next: "time" },
                    { text: "📦 Будут новые паки?", next: "packs" },
                    { text: "🔙 Назад", next: "start" }
                ]
            },
            archive: {
                reply: "Архив доступен прямо на главной странице. Там все версии от 1.0 до 3.3. Тебе какую? 📂",
                hints: [
                    { text: "💎 Самая стабильная?", next: "stable" },
                    { text: "🔙 Назад", next: "start" }
                ]
            },
            fix: {
                reply: "Спокойно, без паники! Если что-то не ставится, Оракул поможет разобраться, или иди сразу в Titan. 🛡️",
                hints: [
                    { text: "🛡️ Перейти в Titan", link: "titan.html" },
                    { text: "🔙 Назад", next: "start" }
                ]
            },
            time: { reply: "Запуск в 12:00 по МСК. Не пропусти! ⏰", hints: [{ text: "🔙 Ок", next: "start" }] },
            packs: { reply: "Да, добавим 'LMSH Legacy' и пару секретных бонусов. 📦", hints: [{ text: "🔙 Ок", next: "start" }] },
            stable: { reply: "Версия 3.3 сейчас самая надежная для работы. 💎", hints: [{ text: "🔙 Ок", next: "start" }] }
        };

        function renderHints(key) {
            hintsBox.innerHTML = "";
            const items = key === 'start' ? flow.start : flow[key].hints;
            
            items.forEach(item => {
                const b = document.createElement('div');
                b.className = "hint-btn";
                b.innerText = item.text;
                b.onclick = () => {
                    if(item.link) {
                        window.location.href = item.link;
                    } else {
                        handleChoice(item.text, item.next);
                    }
                };
                hintsBox.appendChild(b);
            });
        }

        function handleChoice(text, nextKey) {
            // 1. Сообщение юзера
            addMsg(text, 'outgoing');
            
            // 2. Анимация печати
            status.innerText = "печатает...";
            const loader = document.createElement('div');
            loader.className = 'typing';
            loader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatBox.appendChild(loader);
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. Ответ
            setTimeout(() => {
                loader.remove();
                status.innerText = "в сети";
                addMsg(flow[nextKey].reply, 'incoming');
                renderHints(nextKey);
            }, 800);
        }

        function addMsg(text, type) {
            const d = document.createElement('div');
            d.className = `message ${type}`;
            d.innerText = text;
            chatBox.appendChild(d);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function manualSend() {
            const inp = document.getElementById('user-in');
            if(inp.value.trim()) {
                addMsg(inp.value, 'outgoing');
                setTimeout(() => addMsg("Принято! Но лучше используй кнопки выше для скорости. 😉", 'incoming'), 600);
                inp.value = "";
            }
        }

        // Старт
        renderHints('start');
    </script>
</body>
</html>
