<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LMSH | Быстрый Помощник (Smart)</title>
    <style>
        :root { --ios-blue: #0a84ff; --ios-bg: #000000; --ios-gray: #1c1c1e; --ios-text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--ios-bg); color: var(--ios-text); height: 100vh; overflow: hidden; }
        
        .chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }
        
        /* HEADER */
        .chat-header { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 0.5px solid #333;
            z-index: 10;
        }
        .back-btn { color: var(--ios-blue); cursor: pointer; text-decoration: none; font-size: 17px; }
        
        /* ЧАТ */
        .chat-main { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        
        .message { 
            padding: 10px 16px; border-radius: 20px; font-size: 16px; max-width: 80%; line-height: 1.4; 
            animation: msgPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes msgPop { from { opacity: 0; transform: scale(0.8) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .incoming { background: var(--ios-gray); align-self: flex-start; border-bottom-left-radius: 4px; }
        .outgoing { background: var(--ios-blue); align-self: flex-end; border-bottom-right-radius: 4px; }

        /* АНИМАЦИЯ ПЕЧАТИ */
        .typing { display: flex; gap: 4px; padding: 12px 16px; background: var(--ios-gray); border-radius: 20px; width: fit-content; margin-bottom: 10px; }
        .dot { width: 6px; height: 6px; background: #8e8e93; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* ПОДСКАЗКИ */
        .suggestions-container { 
            display: flex; gap: 10px; padding: 10px 15px; overflow-x: auto; 
            scrollbar-width: none; opacity: 0; transform: translateY(10px); transition: 0.5s;
        }
        .suggestions-container.active { opacity: 1; transform: translateY(0); }
        .hint-chip { 
            background: #1c1c1e; border: 1px solid #333; color: var(--ios-blue); 
            padding: 8px 18px; border-radius: 20px; white-space: nowrap; font-size: 14px; cursor: pointer;
            transition: 0.2s;
        }
        .hint-chip:active { background: #2c2c2e; transform: scale(0.95); }

        /* ВВОД */
        .chat-input-area { padding: 10px 15px 30px; display: flex; gap: 10px; align-items: center; background: #000; }
        .input-wrapper { flex: 1; background: #1c1c1e; border-radius: 20px; padding: 8px 15px; }
        #msg-input { width: 100%; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        #send-btn { 
            background: var(--ios-blue); color: white; border: none; border-radius: 50%; 
            width: 34px; height: 34px; cursor: pointer; transition: 0.3s;
        }
        #send-btn:disabled { opacity: 0.3; }
    </style>
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <a href="index.html" class="back-btn">‹ Назад</a>
            <div style="text-align:center">
                <div style="font-weight:700">Быстрый Помощник</div>
                <div id="status" style="font-size:10px; color:#8e8e93">в сети</div>
            </div>
            <div style="color:var(--ios-blue); font-size: 20px;">👤</div>
        </header>

        <main class="chat-main" id="chat-window">
            <div class="message incoming">Привет! Я помогу разобраться с Kosmo Level. О чем хочешь узнать? 🛠</div>
        </main>

        <div id="quick-hints" class="suggestions-container active">
            </div>

        <footer class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="msg-input" placeholder="Сообщение" autocomplete="off">
            </div>
            <button id="send-btn" onclick="sendMsg()">↑</button>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msg-input');
        const hintBox = document.getElementById('quick-hints');
        const status = document.getElementById('status');

        // База подсказок в зависимости от контекста
        const hintsMap = {
            start: ["🤫 Секрет 26 апреля?", "📂 Показать архив", "🛠 Как установить?"],
            secret: ["📈 Что нового в 3.4?", "⏰ Во сколько релиз?", "🔙 К версиям"],
            archive: ["💎 Kosmo 3.3", "🐉 Traitor 2.1", "🔙 Другой вопрос"]
        };

        function renderHints(key) {
            hintBox.innerHTML = "";
            hintBox.classList.remove('active');
            
            setTimeout(() => {
                hintsMap[key].forEach(text => {
                    const chip = document.createElement('div');
                    chip.className = "hint-chip";
                    chip.innerText = text;
                    chip.onclick = () => { msgInput.value = text; sendMsg(); };
                    hintBox.appendChild(chip);
                });
                hintBox.classList.add('active');
            }, 300);
        }

        function sendMsg() {
            const text = msgInput.value.trim();
            if (!text) return;

            // 1. Твое сообщение
            renderMessage(text, 'outgoing');
            msgInput.value = "";
            hintBox.classList.remove('active');
            
            // 2. Анимация печати
            showTyping(true);

            // 3. Имитация ответа
            setTimeout(() => {
                showTyping(false);
                let reply = "Интересный вопрос! Штаб уже готовит данные. Что еще подсказать? 🛠";
                let nextHints = "start";

                if(text.includes('26 апреля')) {
                    reply = "🤫 26 апреля 2026 года в 12:00 МСК — глобальный запуск Kosmo Level 3.4. Будь готов!";
                    nextHints = "secret";
                } else if(text.includes('архив')) {
                    reply = "📂 В нашем архиве доступны все версии от 1.0 до 3.3. Какая тебя интересует?";
                    nextHints = "archive";
                }

                renderMessage(reply, 'incoming');
                renderHints(nextHints);
            }, 1500);
        }

        function renderMessage(text, type) {
            const d = document.createElement('div');
            d.className = `message ${type}`;
            d.innerText = text;
            chatWindow.appendChild(d);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTyping(show) {
            const existing = document.querySelector('.typing');
            if (show && !existing) {
                status.innerText = "печатает...";
                const t = document.createElement('div');
                t.className = "typing";
                t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
                chatWindow.appendChild(t);
            } else if (!show && existing) {
                status.innerText = "в сети";
                existing.remove();
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Первичная инициализация
        renderHints('start');

        msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
