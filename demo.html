<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ORACLE DEMO | PRESTIGE</title>
    <style>
        :root { 
            --bg: #000000; --card: rgba(28, 28, 30, 0.8); --accent: #00f2ff; 
            --user-bg: #007aff; --ai-bg: #262629; --text: #fff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        
        body { 
            background: var(--bg); color: var(--text); height: 100vh; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
        }

        /* Кнопка закрытия в стиле iOS */
        .close-btn {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.1); display: flex; align-items: center;
            justify-content: center; cursor: pointer; backdrop-filter: blur(10px);
            text-decoration: none; color: #fff; font-size: 18px;
        }

        .card { 
            background: var(--card); width: 95%; max-width: 420px; height: 85vh;
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; padding: 20px;
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        #ai-head { 
            text-align: center; font-size: 14px; font-weight: 500; 
            margin: 10px 0 20px 0; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px;
        }

        #chat { 
            flex: 1; overflow-y: auto; padding: 10px; 
            display: flex; flex-direction: column; scrollbar-width: none;
        }
        #chat::-webkit-scrollbar { display: none; }

        .bubble { 
            max-width: 80%; padding: 12px 16px; border-radius: 20px; 
            margin-bottom: 8px; font-size: 16px; line-height: 1.35;
            animation: iosPop 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--ai-bg); color: #fff; border-bottom-left-radius: 4px; }

        @keyframes iosPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .input-area { 
            display: flex; gap: 10px; padding: 15px 5px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
        }
        input { 
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 18px; border-radius: 22px; color: #fff; font-size: 16px; outline: none;
        }
        .send-btn { 
            background: var(--accent); color: #000; border: none; 
            width: 40px; height: 40px; border-radius: 50%; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <a href="index.html" class="close-btn">✕</a>

    <div class="card">
        <h2 id="ai-head">Oracle Legacy Mode</h2>

        <div id="chat">
            <div class="bubble ai">Здравствуйте я Агент из Oracle, могу чем помочь или чисто поболтать</div>
        </div>

        <div class="input-area">
            <input type="text" id="ai-q" placeholder="Сообщение" onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="ask()">↑</button>
        </div>
    </div>

    <script>
        function handleEnter(e) { if (e.key === 'Enter') ask(); }

        function ask() {
            const input = document.getElementById('ai-q');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if (!text) return;

            chat.innerHTML += `<div class="bubble user">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            setTimeout(() => {
                let reply = "к";
                const t = text.toLowerCase();
                
                if(t.includes("привет")) reply = "Привет! Система 3.3 на связи. Чем помочь?";
                if(t.includes("как дела")) reply = "Занят расшифровкой старых логов Kosmo Level. У тебя как?";
                if(t.includes("ящик")) reply = "Тот самый ящик... Ключ повернется 26 апреля 2026 года. Готовься.";
                if(t.includes("12 империя")) reply = "12 империя — это начало новой главы. Team2903 следит за прогрессом.";
                if(t.includes("3.2")) reply = "О, легендарное прохождение Саши! 43 минуты чистого экшена. Хочешь тайм-коды?";
                if(t.includes("oracle ии")) reply = "О, Оракул ИИ, это мой старший Брат. У тебя проблемы с ним? Или просто хочешь сравнить их?"

                chat.innerHTML += `<div class="bubble ai">${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
