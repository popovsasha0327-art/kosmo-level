<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LMSH | Быстрый Помощник (Dark)</title>
    <style>
        :root { --ios-blue: #0a84ff; --ios-bg: #000000; --ios-gray: #1c1c1e; --ios-text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--ios-bg); color: var(--ios-text); height: 100vh; overflow: hidden; }
        
        .chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }
        
        .chat-header { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 0.5px solid #333;
        }
        .back-btn { color: var(--ios-blue); cursor: pointer; text-decoration: none; }
        
        .chat-main { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .message { padding: 10px 16px; border-radius: 20px; font-size: 16px; max-width: 80%; line-height: 1.4; }
        .incoming { background: var(--ios-gray); align-self: flex-start; border-bottom-left-radius: 4px; }
        .outgoing { background: var(--ios-blue); align-self: flex-end; border-bottom-right-radius: 4px; }

        .suggestions-container { display: flex; gap: 10px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none; }
        .hint-chip { 
            background: #1c1c1e; border: 1px solid #333; color: var(--ios-blue); 
            padding: 8px 15px; border-radius: 20px; white-space: nowrap; font-size: 14px; cursor: pointer;
        }

        .chat-input-area { padding: 10px 15px 30px; display: flex; gap: 10px; align-items: center; }
        .input-wrapper { flex: 1; background: #1c1c1e; border-radius: 20px; padding: 8px 15px; }
        #msg-input { width: 100%; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        #send-btn { 
            background: var(--ios-blue); color: white; border: none; border-radius: 50%; 
            width: 35px; height: 35px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <a href="index.html" class="back-btn">‹ Назад</a>
            <div style="text-align:center">
                <div style="font-weight:bold">Быстрый Помощник</div>
                <div style="font-size:10px; color:#8e8e93">в сети 🛠</div>
            </div>
            <div style="color:var(--ios-blue)">ⓘ</div>
        </header>

        <main class="chat-main" id="chat-window">
            <div class="message incoming">Привет, Саня! Что за секрет мы готовим на 26 апреля? Или есть вопросы по пакам? 🛠</div>
        </main>

        <div id="quick-hints" class="suggestions-container">
            <div class="hint-chip" onclick="askHint('Что за секрет будет 26 Апреля 2026?')">🤫 Секрет 26 апреля?</div>
            <div class="hint-chip" onclick="askHint('Как установить пак 3.3?')">💾 Установка 3.3</div>
            <div class="hint-chip" onclick="askHint('Где найти архив?')">📂 Архив версий</div>
        </div>

        <footer class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="msg-input" placeholder="Сообщение" autocomplete="off">
            </div>
            <button id="send-btn" onclick="sendMsg()">↑</button>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msg-input');

        function sendMsg() {
            const text = msgInput.value.trim();
            if (!text) return;
            renderMessage(text, 'outgoing');
            msgInput.value = "";
            document.getElementById('quick-hints').style.display = 'none';

            setTimeout(() => {
                let reply = "Принял! Штаб обрабатывает информацию. 🛠";
                if(text.includes('26 Апреля')) reply = "🤫 Секрет раскрыт: 26 Апреля 2026 в 12:00 МСК выйдет Kosmo Level 3.4. Это будет легендарно!";
                renderMessage(reply, 'incoming');
            }, 800);
        }

        function renderMessage(text, type) {
            const d = document.createElement('div');
            d.className = `message ${type}`;
            d.innerText = text;
            chatWindow.appendChild(d);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function askHint(q) { msgInput.value = q; sendMsg(); }

        msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
