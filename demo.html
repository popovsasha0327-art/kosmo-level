<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMSH | Быстрый Помощник</title>
    <link rel="stylesheet" href="imessage.css">
</head>
<body>
    <div class="imessage-container">
        <header class="chat-header">
            <button class="back-btn" onclick="window.location.href='index.html'">‹ Стор</button>
            <div class="contact-info">
                <div class="avatar">L</div>
                <div class="name-status">
                    <span class="contact-name">Быстрый Помощник</span>
                    <span class="status">В сети</span>
                </div>
            </div>
            <div class="info-icon">i</div>
        </header>

        <main class="chat-body" id="chat-body">
            <div class="date-divider">Сегодня 12:00</div>
            
            <div class="message received">
                <div class="bubble">Привет! Я твой быстрый помощник по Kosmo Level. Что тебя интересует?</div>
            </div>
            
            <div class="message sent">
                <div class="bubble">Как установить версию 3.3?</div>
            </div>

            <div class="message received">
                <div class="bubble">Всё просто: скачай пак, распакуй в папку с игрой и перезапусти систему. Нужна детальная инструкция?</div>
            </div>
        </main>

        <footer class="chat-input-area">
            <div class="plus-btn">+</div>
            <div class="input-wrapper">
                <input type="text" id="msg-input" placeholder="iMessage">
                <button class="send-icon" onclick="sendMsg()">↑</button>
            </div>
        </footer>
    </div>

    <script>
        function sendMsg() {
            const input = document.getElementById('msg-input');
            const body = document.getElementById('chat-body');
            if(!input.value.trim()) return;

            // Твоё сообщение
            const msg = document.createElement('div');
            msg.className = 'message sent';
            msg.innerHTML = `<div class="bubble">${input.value}</div>`;
            body.appendChild(msg);
            
            input.value = '';
            body.scrollTop = body.scrollHeight;

            // Ответ (заглушка)
            setTimeout(() => {
                const reply = document.createElement('div');
                reply.className = 'message received';
                reply.innerHTML = `<div class="bubble">Интересный вопрос! Дай мне секунду...</div>`;
                body.appendChild(reply);
                body.scrollTop = body.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
