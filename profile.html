<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРОФИЛЬ | LMSH 340</title>
    <link rel="stylesheet" href="main-prestige.css">
    <style>
        .profile-container {
            padding: 120px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
            background: var(--accent-solid);
            color: #000;
        }
    </style>
</head>
<body>
    <header>
        <div onclick="location.href='index.html'" style="cursor:pointer">≡ К ГЛАВНОЙ</div>
        <div id="tierName" style="font-weight:bold; letter-spacing:2px">РЕЗИДЕНТ</div>
    </header>

    <div class="profile-container">
        <div class="store-card">
            <div id="userAvatar" style="width:80px; height:80px; background:var(--border); border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:30px">👤</div>
            <h2 id="userNameDisplay">ЗАГРУЗКА...</h2>
            <div id="userTierBadge" class="status-badge">TIER: 340</div>
            
            <hr style="border:0; border-top:1px solid var(--border); margin:30px 0;">
            
            <p style="font-size:14px; opacity:0.6; margin-bottom:20px">Управление мощностью Оракула:</p>
            
            <button class="btn-more" onclick="location.href='upgrade.html'" style="width:100%; background:var(--accent-solid); color:#000">ПОВЫСИТЬ УРОВЕНЬ</button>
            
            <button class="btn-more" onclick="OracleSystem.logout()" style="width:100%; background:transparent; border:1px solid var(--danger); color:var(--danger); margin-top:15px">ВЫЙТИ</button>
        </div>
    </div>

    <script src="brain.js"></script>
    <script>
        // Локальная отрисовка данных профиля
        window.addEventListener('load', () => {
            const name = localStorage.getItem('userName') || "Гость";
            const tier = localStorage.getItem('userTier') || "340";
            
            document.getElementById('userNameDisplay').innerText = name;
            document.getElementById('userTierBadge').innerText = `TIER: ${tier}`;
            
            if(tier === 'Ultra') {
                document.getElementById('userTierBadge').style.background = '#ffd60a';
                document.getElementById('tierName').innerText = 'ELITE RESIDENT';
            }
        });
    </script>
</body>
</html>
