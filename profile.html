<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige | Profile Settings</title>
    <style>
        :root {
            --bg: #050508;
            --accent: #007aff;
            --card-bg: rgba(28, 28, 30, 0.8);
            --text: #ffffff;
        }

        /* ТЕМЫ */
        body.theme-purple { --accent: #bf5af2; --bg: #0a050f; }
        body.theme-green { --accent: #32d74b; --bg: #050805; }
        body.theme-gold { --accent: #ffd60a; --bg: #080705; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; transition: 0.5s;
        }

        .profile-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px; border-radius: 35px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .avatar {
            width: 80px; height: 80px; background: var(--accent);
            border-radius: 50%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; box-shadow: 0 0 20px var(--accent);
        }

        h2 { text-align: center; margin-bottom: 30px; letter-spacing: 1px; }

        .section-title {
            font-size: 12px; text-transform: uppercase;
            color: #8e8e93; margin: 20px 0 10px; letter-spacing: 2px;
        }

        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        select, input[type="text"] {
            background: #2c2c2e; border: 1px solid #444;
            color: white; padding: 8px; border-radius: 10px; outline: none;
        }

        /* КНОПКА СОХРАНЕНИЯ */
        .save-btn {
            width: 100%; padding: 15px; border-radius: 15px;
            border: none; background: var(--accent);
            color: #000; font-weight: 900; cursor: pointer;
            margin-top: 30px; transition: 0.3s;
        }
        .save-btn:hover { transform: scale(1.03); filter: brightness(1.2); }

        .back-link {
            display: block; text-align: center; margin-top: 20px;
            color: #444; text-decoration: none; font-size: 13px;
        }
    </style>
</head>
<body id="mainBody">

<div class="profile-container">
    <div class="avatar" id="avatarBox">👤</div>
    <h2 class="grad-text">Настройки Профиля</h2>

    <div class="section-title">Данные резидента</div>
    <div class="setting-row">
        <span>Никнейм</span>
        <input type="text" id="nickname" placeholder="Admin">
    </div>

    <div class="section-title">Внешний вид</div>
    <div class="setting-row">
        <span>Цветовая тема</span>
        <select id="themeSelect" onchange="applyTheme()">
            <option value="blue">Синий Оракул</option>
            <option value="purple">Фиолетовый Креатив</option>
            <option value="green">Зеленый Defender</option>
            <option value="gold">Золотой Помощник</option>
        </select>
    </div>

    <div class="setting-row">
        <span>Анимация фона</span>
        <input type="checkbox" id="bgToggle" checked>
    </div>

    <div class="section-title">Облако</div>
    <div id="syncStatus" style="font-size: 11px; color: var(--accent); text-align: center;">Статус: Локально</div>

    <button class="save-btn" onclick="saveAll()">СОХРАНИТЬ В ОБЛАКО ☁️</button>
    
    <a href="index.html" class="back-link">← Вернуться в Штаб</a>
</div>

<script>
    // URL твоего Google Apps Script
    const GAS_URL = 'ССЫЛКА_ИЗ_ДЕПЛОЯ_ГУГЛ_СКРИПТА';

    // 1. Применяем тему при выборе в меню
    function applyTheme() {
        const theme = document.getElementById('themeSelect').value;
        const body = document.getElementById('mainBody');
        body.className = ''; // Сброс
        if(theme !== 'blue') body.classList.add('theme-' + theme);
    }

    // 2. Загрузка настроек при старте
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('prestige_settings') || '{}');
        if(saved.nickname) document.getElementById('nickname').value = saved.nickname;
        if(saved.theme) {
            document.getElementById('themeSelect').value = saved.theme;
            applyTheme();
        }
        if(saved.bg === false) document.getElementById('bgToggle').checked = false;
    };

    // 3. Сохранение в LocalStorage и Google Sheets
    async function saveAll() {
        const settings = {
            nickname: document.getElementById('nickname').value,
            theme: document.getElementById('themeSelect').value,
            bg: document.getElementById('bgToggle').checked,
            lastUpdate: new Date().toLocaleString()
        };

        // Сохраняем локально
        localStorage.setItem('prestige_settings', JSON.stringify(settings));
        
        const status = document.getElementById('syncStatus');
        status.innerText = "Синхронизация...";

        try {
            // Отправка в Google Таблицу через твой скрипт
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(settings)
            });
            status.innerText = "Успешно сохранено в облаке ✅";
        } catch(e) {
            status.innerText = "Ошибка облака. Сохранено локально.";
            console.error(e);
        }
    }
</script>

</body>
</html>
