<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>KL Profile</title>
    <style>
        body { background: #050508; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0d0d14; padding: 30px; border-radius: 25px; border: 1px solid #bf5af2; text-align: center; width: 300px; box-shadow: 0 10px 40px rgba(191,90,242,0.2); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
        button { background: #bf5af2; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 40px; margin-bottom: 10px;">👤</div>
        <h2>KL ID</h2>
        <input type="text" id="u" placeholder="Логин (Саня)">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="login()">ВХОД В СИСТЕМУ</button>
        <br><br>
        <a href="index.html" style="color: grey; font-size: 12px; text-decoration: none;">Вернуться в Эпицентр</a>
    </div>

    <script>
        function login() {
            const user = document.getElementById('u').value.trim();
            if(user === "Саня") {
                localStorage.setItem('kl_auth', 'true');
                alert("✅ Авторизация Командира подтверждена!");
                window.location.href = 'index.html';
            } else {
                alert("❌ Ошибка! Проверьте логин.");
            }
        }
    </script>
</body>
</html>
