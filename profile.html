<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KL Profile</title>
    <style>
        body { background: #050508; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0d0d14; padding: 30px; border-radius: 20px; border: 1px solid #bf5af2; text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; box-sizing: border-box; }
        button { background: #bf5af2; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>KL ID LOGIN</h2>
        <input type="text" id="user" placeholder="Логин (Саня)">
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="doLogin()">ВОЙТИ</button>
        <br><br>
        <a href="index.html" style="color: grey; font-size: 12px;">Вернуться на главную</a>
    </div>

    <script>
        function doLogin() {
            const u = document.getElementById('user').value;
            if(u === "Саня") {
                localStorage.setItem('kl_auth', 'true');
                alert("✅ Вход выполнен! Перенаправление...");
                window.location.href = 'index.html';
            } else {
                alert("❌ Ошибка авторизации!");
            }
        }
    </script>
</body>
</html>
