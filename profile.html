<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль | Kosmo Level</title>
    <link rel="stylesheet" href="main-prestige.css">
</head>
<body>
    <header>
        <a href="index.html" style="color: white; text-decoration: none;">← Назад</a>
        <div style="font-weight: bold;">ВАШ ПРОФИЛЬ</div>
        <div>👤</div>
    </header>

    <div id="lockOverlay">
        <h2 style="color: var(--accent);">Доступ ограничен</h2>
        <p>Войдите в аккаунт, чтобы открыть все возможности системы</p>
        
        <table class="auth-table">
            <thead>
                <tr><th>Без Аккаунта</th><th>С Аккаунтом</th></tr>
            </thead>
            <tbody>
                <tr><td>Нельзя читать истории ❌</td><td>Безлимитный доступ ✅</td></tr>
                <tr><td>Нет связи с ЛМСХ ❌</td><td>Прямой канал связи ✅</td></tr>
                <tr><td>Сброс памяти ИИ ❌</td><td>История сохраняется ✅</td></tr>
            </tbody>
        </table>

        <div>
            <button class="btn-auth" style="background: var(--glass); color: white;">Войти</button>
            <button class="btn-auth" style="background: var(--accent); color: white;">Зарегистрироваться</button>
        </div>
    </div>

    <main style="padding: 120px 20px; text-align: center;">
        <h1>Личный кабинет</h1>
        <p>Добро пожаловать в Штаб.</p>
    </main>

    <script src="brain.js"></script>
</body>
</html>
