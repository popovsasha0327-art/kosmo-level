<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LMSH | Auth</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: #1c1c1e; padding: 30px; border-radius: 25px; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #2c2c2e; border: none; border-radius: 10px; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00f2ff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle { font-size: 12px; color: #888; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2 id="title">Войти</h2>
    <input type="text" id="name" placeholder="Твое Имя (для Sign Up)" style="display:none;">
    <input type="email" id="email" placeholder="Почта">
    <input type="password" id="pass" placeholder="Пароль">
    <button onclick="handleAuth()">ПОДТВЕРДИТЬ</button>
    <div class="toggle" onclick="toggleMode()">Нет аккаунта? Зарегистрироваться</div>
</div>

<script>
    let isLogin = true;
    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "Войти" : "Регистрация";
        document.getElementById('name').style.display = isLogin ? "none" : "block";
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const name = document.getElementById('name').value;

        // СЕКРЕТНЫЙ АККАУНТ
        if(email === "Oracle@lmsh.com" && pass === "6hqHeHnX03V%92") {
            localStorage.setItem('LMSH_RANK', 'OVERLORD');
            localStorage.setItem('LMSH_NAME', 'Саня');
            window.location.href = 'index.html';
            return;
        }

        if(!isLogin && name) { localStorage.setItem('LMSH_NAME', name); }
        localStorage.setItem('LMSH_RANK', 'AGENT');
        localStorage.setItem('LMSH_LOGGED', 'true');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
